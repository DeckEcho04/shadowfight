<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shadow Fight — Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: radial-gradient(circle at top, #1a1a2e 0%, #05050a 100%); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100dvh; width: 100vw; overflow-x: hidden; overflow-y: auto; touch-action: pan-y; }
  
  #app { min-height: 100dvh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 10px; position: relative; }
  .version-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); z-index: 100; }

  .screen { display: none; width: 100%; max-width: 900px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  #arena-screen.active { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; padding: 0; background: #000; overflow: hidden; touch-action: none; justify-content: center; z-index: 999;}

  /* LOBBY UI */
  #lobby-ui { background: rgba(17, 17, 34, 0.85); padding: 20px; border-radius: 16px; margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2); text-align: center; max-width: 600px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
  .lobby-row { display: flex; gap: 15px; margin-bottom: 15px; text-align: left; align-items: flex-end;}
  .input-group { flex: 1; display: flex; flex-direction: column; }
  .input-group label { font-size: 11px; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  input, select { padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
  input:focus { border-color: #6366f1; }
  select { cursor: pointer; }
  button { padding: 14px; background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); text-transform: uppercase; letter-spacing: 1px; }
  button:active { transform: scale(0.96); }
  
  .id-box { background: rgba(79, 70, 229, 0.1); border: 1px dashed #6366f1; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; box-shadow: inset 0 0 20px rgba(79, 70, 229, 0.1); }
  .my-id { font-family: monospace; color: #a5b4fc; font-weight: bold; font-size: 24px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
  #connection-status { font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 6px; display: none; font-weight: bold; }

  /* CHAR SELECT */
  .header { display: flex; justify-content: space-between; align-items: center; margin: 0 auto 15px; max-width: 800px; width: 100%; }
  .header h2 { font-weight: 900; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  
  /* EXPANDED ROSTER GRID */
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 800px; margin: 0 auto; width: 100%; transition: opacity 0.3s; }
  @media (max-width: 768px) { .char-grid { grid-template-columns: repeat(3, 1fr); } }
  
  .char-grid.locked { opacity: 0.3; filter: grayscale(100%); pointer-events: none; }
  .char-card { background: linear-gradient(180deg, #1e1e3f 0%, #111122 100%); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 15px 10px; text-align: center; cursor: pointer; opacity: 0.5; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  .char-card.unlocked { opacity: 1; pointer-events: auto; }
  .char-card.unlocked:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.4); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
  .char-card.selected-p1 { border-color: #6366f1; background: linear-gradient(180deg, #312e81 0%, #1e1b4b 100%); box-shadow: 0 0 20px rgba(79, 70, 229, 0.6); transform: scale(1.05); z-index: 2; position: relative; }
  .char-card.selected-p2 { border-color: #ef4444; background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transform: scale(1.05); z-index: 2; position: relative; }
  .char-name { font-size: 15px; font-weight: 900; display: block; margin-top: 8px;}
  .char-power { font-size: 10px; margin-top: 2px; display: block; font-weight: 800; text-transform: uppercase;}
  .char-icon { width: 50px; height: 50px; margin: 0 auto; border-radius: 14px; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.4) 100%); box-shadow: inset 0px 2px 4px rgba(255,255,255,0.5), 0 5px 10px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .char-icon svg { width: 28px; height: 28px; fill: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); z-index: 2; }

  /* MULTI-TIER SCREEN SHAKE */
  @keyframes shake { 0%{transform:translate(6px,3px);} 25%{transform:translate(-5px,-6px);} 50%{transform:translate(-8px,0px);} 75%{transform:translate(5px,6px);} 100%{transform:translate(0,0);} }
  .shake-anim { animation: shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
  
  @keyframes shakeHeavy { 0%{transform:translate(15px,10px) rotate(2deg);} 25%{transform:translate(-15px,-12px) rotate(-2deg);} 50%{transform:translate(-20px,5px) rotate(1deg);} 75%{transform:translate(15px,15px) rotate(0deg);} 100%{transform:translate(0,0);} }
  .shake-anim-heavy { animation: shakeHeavy 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

  #game-container { position: relative; width: 100%; flex: 1; overflow: hidden; display: flex; flex-direction: column; max-height: 800px; background-size: cover; background-position: center bottom; }
  #arena { position: absolute; width: 100%; height: 100%; perspective: 1000px; overflow: hidden; }
  .floor { position: absolute; bottom: 0; width: 120%; left: -10%; height: 40%; transform: rotateX(75deg); transform-origin: top; box-shadow: 0 -30px 60px rgba(0,0,0,0.9); }
  
  /* NEW HIGH-END VFX ENGINE */
  .vfx-base { position: absolute; bottom: 25%; pointer-events: none; z-index: 15; }
  
  .vfx-ring { border-radius: 50%; opacity: 1; animation: explodeRing 0.4s ease-out forwards; }
  @keyframes explodeRing { 0% { transform: translate(var(--vx), var(--vy)) scale(0); border-width: 15px; } 100% { transform: translate(var(--vx), var(--vy)) scale(3.5); opacity: 0; border-width: 0px; } }
  
  .vfx-acid { background: rgba(34, 197, 94, 0.5); border-radius: 50%; transform: translate(var(--vx), calc(var(--vy) + 60px)) rotateX(70deg); box-shadow: 0 0 30px #22c55e, inset 0 0 30px #22c55e; filter: blur(2px); width: 180px; height: 50px; }
  
  /* REAL SMOKE VANISH */
  .vfx-smoke { width: 180px; height: 180px; background: radial-gradient(circle, rgba(148,163,184,1) 0%, rgba(71,85,105,0.8) 40%, transparent 70%); border-radius: 50%; opacity: 1; animation: smokePoof 0.8s ease-out forwards; filter: blur(10px); mix-blend-mode: screen; }
  @keyframes smokePoof { 0% { transform: translate(var(--vx), var(--vy)) scale(0.2); opacity: 1; } 100% { transform: translate(var(--vx), var(--vy)) scale(2.5); opacity: 0; } }

  /* DEADEYE CROSSHAIR */
  .vfx-crosshair { width: 80px; height: 80px; border: 6px solid #dc2626; border-radius: 50%; opacity: 0; animation: lockOn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 0 0 15px #dc2626, inset 0 0 15px #dc2626;}
  .vfx-crosshair::before, .vfx-crosshair::after { content: ''; position: absolute; background: #dc2626; box-shadow: 0 0 8px #dc2626;}
  .vfx-crosshair::before { top: 50%; left: -20px; right: -20px; height: 6px; margin-top: -3px; }
  .vfx-crosshair::after { left: 50%; top: -20px; bottom: -20px; width: 6px; margin-left: -3px; }
  @keyframes lockOn { 0% { transform: translate(var(--vx), var(--vy)) scale(4) rotate(90deg); opacity: 0; } 100% { transform: translate(var(--vx), var(--vy)) scale(1) rotate(0deg); opacity: 1; } }

  .vfx-text { font-family: monospace; font-weight: bold; font-size: 24px; animation: floatUp 1s ease-out forwards; text-shadow: 0 0 10px currentColor; }
  @keyframes floatUp { 0% { transform: translate(var(--vx), var(--vy)); opacity: 1; } 100% { transform: translate(var(--vx), calc(var(--vy) - 80px)); opacity: 0; } }

  /* DYNAMIC HUD */
  .hud { position: absolute; top: 0; width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; z-index: 10; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); }
  .player-tag { font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 6px; text-shadow: 0 2px 4px black; letter-spacing: 1px; display: flex; align-items: baseline; gap: 6px;}
  .char-tag { font-size: 10px; color: #a1a1aa; font-weight: 800; letter-spacing: 0.5px; }
  .hp-bar-bg { width: 35vw; max-width: 280px; height: 18px; background: rgba(0,0,0,0.8); border-radius: 9px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
  .hp-bar-fill { height: 100%; border-radius: 6px; transition: width 0.15s ease-out; box-shadow: inset 0 0 8px rgba(255,255,255,0.4); }
  .hp-boss { background: linear-gradient(90deg, #7f1d1d, #ef4444); width: 100%; }
  .sp-bar-bg { width: 35vw; max-width: 280px; height: 6px; background: rgba(0,0,0,0.7); border-radius: 3px; margin-top: 6px; }
  .sp-bar-fill { height: 100%; width: 0%; background: #fbbf24; transition: width 0.2s; box-shadow: 0 0 5px #fbbf24; }
  #boss-hud { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 60vw; max-width: 400px; text-align: center; display: none; z-index: 9; }

  /* K.O. SCREEN */
  #victory-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px); }
  #victory-ko { font-size: 120px; color: #ef4444; font-style: italic; font-weight: 900; text-shadow: 0 0 30px red, 5px 5px 0px #7f1d1d; margin-bottom: -10px; line-height: 1; }
  #winner-name { font-size: 35px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
  .rematch-btn { margin-top: 40px; padding: 15px 40px; font-size: 18px; border-radius: 30px; background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4); border: none; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }

  .particle { position: absolute; width: 8px; height: 8px; background: #fbbf24; border-radius: 50%; pointer-events: none; z-index: 50; box-shadow: 0 0 15px #ef4444, 0 0 25px #fbbf24; }

  /* SKELETAL FIGHTERS */
  .fighter { position: absolute; bottom: 25%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .f-rig { position: relative; width: 40px; height: 80px; transition: transform 0.05s; }
  .f-head { position: absolute; top: -20px; left: 50%; width: 22px; height: 26px; margin-left: -11px; border-radius: 40% 40% 50% 50%; z-index: 5; box-shadow: inset -2px -2px 6px rgba(0,0,0,0.6);}
  .f-torso { position: absolute; top: 5px; left: 50%; width: 26px; height: 35px; margin-left: -13px; border-radius: 6px 6px 4px 4px; z-index: 4; box-shadow: inset 0 0 10px rgba(0,0,0,0.7); clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); }
  .f-limb { position: absolute; width: 8px; border-radius: 4px; transform-origin: top center; box-shadow: inset -1px -1px 4px rgba(0,0,0,0.6); }
  .f-limb::after { content: ''; position: absolute; top: calc(100% - 4px); left: 0; width: 100%; height: 100%; background: inherit; border-radius: inherit; transform-origin: top center; box-shadow: inherit; transform: rotate(var(--joint, 0deg)); transition: transform 0.05s; }
  
  .f-arm-b { top: 7px; left: 6px; height: 16px; z-index: 2; filter: brightness(0.5); }
  .f-arm-f { top: 7px; left: 24px; height: 16px; z-index: 6; }
  .f-leg-b { top: 35px; left: 10px; height: 20px; z-index: 1; filter: brightness(0.5); }
  .f-leg-f { top: 35px; left: 22px; height: 20px; z-index: 3; }
  .boss-rig { transform: scale(1.6); transform-origin: bottom center; filter: drop-shadow(0 0 15px rgba(255,0,0,0.5)); }

  .hurt .f-head, .hurt .f-torso, .hurt .f-limb { filter: brightness(2) drop-shadow(0 0 10px red) !important; background: #fff !important; }
  .hurt .f-head { transform: rotate(-20deg) translate(-5px, -5px); }
  .blocking .f-arm-f { transform: rotate(-140deg) translate(5px, -5px) !important; }
  .blocking .f-arm-f::after { transform: rotate(90deg) !important; }
  .blocking .f-arm-b { transform: rotate(140deg) !important; }
  .blocking .f-torso { transform: rotate(-10deg); }
  .block-aura { box-shadow: 0 0 15px rgba(255,255,255,0.8), inset 0 0 10px rgba(255,255,255,0.8) !important; border: 2px solid white; }

  .special-label { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); color: #ef4444; font-weight: 900; font-size: 16px; opacity: 0; transition: 0.1s; text-shadow: 0 4px 10px black; z-index: 20; width: 200px; text-align: center; pointer-events: none;}
  .special-label.show { opacity: 1; top: -80px; }

  /* OVERLAY CONTROLS */
  #pc-controls { position: absolute; bottom: 5px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; z-index: 5; pointer-events: none; font-weight: bold; text-shadow: 0 2px 4px black;}
  #mobile-controls { position: absolute; bottom: 15px; left: 0; width: 100%; height: 140px; display: none; justify-content: space-between; padding: 0 20px; z-index: 50; pointer-events: none; }
  @media (max-width: 768px) { #pc-controls { display: none; } }
  
  .d-pad { pointer-events: auto; display: grid; gap: 8px; grid-template-columns: 55px 55px 55px; grid-template-rows: 55px 55px; }
  .action-pad { pointer-events: auto; display: grid; gap: 10px; grid-template-columns: 55px 55px; grid-template-rows: 55px 55px; }
  #btn-up { grid-column: 2; grid-row: 1; } #btn-left { grid-column: 1; grid-row: 2; } #btn-right { grid-column: 3; grid-row: 2; }
  #btn-sp { grid-column: 1; grid-row: 1; } #btn-block { grid-column: 2; grid-row: 1; }
  #btn-punch { grid-column: 1; grid-row: 2; } #btn-kick { grid-column: 2; grid-row: 2; }

  .touch-btn { background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; font-weight: 900; font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .touch-btn.pressed { background: rgba(255,255,255,0.4); transform: scale(0.9); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
  .btn-sp { border-color: #fbbf24; color: #fbbf24; font-size: 24px; text-shadow: 0 0 8px rgba(251, 191, 36, 0.8); }
  .btn-block { border-color: #60a5fa; color: #60a5fa; font-size: 20px; }
</style>
</head>
<body>

<div id="app">
  <div class="version-badge">v0.5.0 (Deadeye & VFX Update)</div>

  <div id="select-screen" class="screen active">
    <div id="lobby-ui">
      <div class="id-box" id="host-panel">
        <div>
          <div style="font-size:11px; color:#a5b4fc; font-weight:900; text-transform:uppercase;">Your Session ID:</div>
          <div class="my-id" id="my-peer-id">Connecting...</div>
        </div>
        <div style="text-align:right;">
          <label style="font-size:10px; color:#aaa; font-weight:bold; text-transform:uppercase;">Map:</label><br>
          <select id="map-select" style="padding:8px; font-size:12px; margin-bottom:6px;">
            <option value="alley">Cyber Alley</option>
            <option value="dojo">Sunset Dojo</option>
            <option value="mamak">Mamak Street</option>
          </select><br>
          <label style="font-size:10px; color:#aaa; font-weight:bold; text-transform:uppercase;">Mode:</label><br>
          <select id="mode-select" style="padding:8px; font-size:12px;">
            <option value="1v1">1v1 Street Fight</option>
            <option value="coop">Co-op Survival</option>
          </select>
        </div>
      </div>

      <div class="lobby-row">
        <div class="input-group" style="flex:2;">
          <label>1. Your Nickname (Required)</label>
          <input type="text" id="player-name" placeholder="e.g. Parv" maxlength="12">
        </div>
      </div>

      <div class="lobby-row" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <div class="input-group" style="flex:2;">
          <label>2. Join a Friend (Leave blank to host)</label>
          <input type="text" id="join-id" placeholder="Paste ID to Join" style="text-transform: uppercase;">
        </div>
        <button onclick="connectToFriend()" style="flex:1; margin-top:22px; background: linear-gradient(135deg, #10b981, #059669);">Join Game</button>
      </div>
      <div id="connection-status"></div>
    </div>
    
    <div class="header">
      <h2>Choose Fighter</h2>
      <button onclick="pickAI()" style="width:auto; padding:10px 16px; background:rgba(255,255,255,0.1); box-shadow:none;">Solo vs AI</button>
    </div>
    <div class="char-grid locked" id="char-list" onclick="checkNameLock()"></div>
  </div>

  <div id="arena-screen" class="screen">
    
    <div id="victory-screen">
      <div id="victory-ko">K.O.</div>
      <div id="winner-name">PLAYER WINS</div>
      <button class="rematch-btn" onclick="handleRematch()">Return to Lobby</button>
    </div>

    <div id="game-container">
      <div id="arena">
        <div class="floor" id="arena-floor"></div>
        <div id="vfx-layer"></div>
        <div id="pc-controls">[A][D] Move &nbsp;|&nbsp; [W] Jump &nbsp;|&nbsp; [B] Block &nbsp;|&nbsp; [J] Punch &nbsp;|&nbsp; [K] Kick &nbsp;|&nbsp; [L] Special</div>

        <div id="p1" class="fighter"><div class="special-label" id="p1-label"></div><div class="f-rig"><div class="f-head"></div><div class="f-arm-b f-limb"></div><div class="f-torso"></div><div class="f-leg-b f-limb"></div><div class="f-leg-f f-limb"></div><div class="f-arm-f f-limb"></div></div></div>
        <div id="p2" class="fighter"><div class="special-label" id="p2-label"></div><div class="f-rig"><div class="f-head"></div><div class="f-arm-b f-limb"></div><div class="f-torso"></div><div class="f-leg-b f-limb"></div><div class="f-leg-f f-limb"></div><div class="f-arm-f f-limb"></div></div></div>
        <div id="p3" class="fighter" style="display:none;"><div class="special-label" id="p3-label"></div><div class="f-rig boss-rig"><div class="f-head" style="background:#450a0a;"></div><div class="f-arm-b f-limb" style="background:#7f1d1d;"></div><div class="f-torso" style="background:#200; border-color:#ef4444;"></div><div class="f-leg-b f-limb" style="background:#7f1d1d;"></div><div class="f-leg-f f-limb" style="background:#b91c1c;"></div><div class="f-arm-f f-limb" style="background:#b91c1c;"></div></div></div>
      </div>
      
      <div class="hud">
        <div style="width: 40%;">
          <div id="p1-tag" class="player-tag">P1 <span id="p1-char" class="char-tag"></span></div>
          <div class="hp-bar-bg"><div id="hp-1" class="hp-bar-fill"></div></div>
          <div class="sp-bar-bg"><div id="sp-1" class="sp-bar-fill"></div></div>
        </div>
        <div style="width: 40%; text-align: right;">
          <div id="p2-tag" class="player-tag" style="justify-content: flex-end;">P2 <span id="p2-char" class="char-tag"></span></div>
          <div class="hp-bar-bg" style="margin-left:auto;"><div id="hp-2" class="hp-bar-fill"></div></div>
          <div class="sp-bar-bg" style="margin-left:auto;"><div id="sp-2" class="sp-bar-fill"></div></div>
        </div>
      </div>
      <div id="boss-hud">
        <div class="player-tag" style="color:#f87171; justify-content: center;">THE BOSS</div>
        <div class="hp-bar-bg" style="width:100%; height:20px; margin:0 auto; border-color:#ef4444;"><div id="hp-3" class="hp-bar-fill hp-boss"></div></div>
      </div>

      <div id="mobile-controls">
        <div class="d-pad"><div class="touch-btn" id="btn-up">↑</div><div class="touch-btn" id="btn-left">←</div><div class="touch-btn" id="btn-right">→</div></div>
        <div class="action-pad">
          <div class="touch-btn btn-sp" id="btn-sp">★</div>
          <div class="touch-btn btn-block" id="btn-block">🛡️</div>
          <div class="touch-btn" id="btn-punch">P</div>
          <div class="touch-btn" id="btn-kick">K</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// THEMED CHARACTER DATA (10 CHARACTERS NOW)
const CHARS = [
  { id:'karthik', name:'Karthik', power:'67 Burst', skin:'#c79a7b', suit:'#1e1b4b', acc:'#4f46e5', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' },
  { id:'andi', name:'Andi', power:'Hulk Out', skin:'#22c55e', suit:'#4c1d95', acc:'#22c55e', icon: '<path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 14a4 4 0 110-8 4 4 0 010 8z"/>' },

const MAPS = {
  alley: { bg: 'radial-gradient(circle at 50% 10%, #312e81 0%, #0f172a 60%)', floor: '#0c0a20', grid: '#4f46e5' },
  dojo:  { bg: 'radial-gradient(circle at 50% 60%, #ef4444 20%, transparent 21%), linear-gradient(180deg, #7c2d12 0%, #b45309 60%, #000 60%)', floor: '#451a03', grid: '#fcd34d' },
  mamak: { bg: 'radial-gradient(circle at 80% 30%, #fde047 10%, transparent 12%), linear-gradient(180deg, #38bdf8 0%, #7dd3fc 45%, #22c55e 45%, #14532d 50%, #171717 50%)', floor: '#262626', grid: '#facc15' }
};

let peer, conn, myPeerId, isHost = true, onlineMode = false;
let myName = "", oppName = "Opponent";
let p1Sel=null, p2Sel=null, f1, f2, f3; 
let keys1 = {}, keys2 = {}, keys = {}, keys3 = {}; 
let activeMode = '1v1', activeMap = 'alley';
let hitStopFrames = 0;
let isGameOver = false;

function checkMobileUI() { if ('ontouchstart' in window || navigator.maxTouchPoints > 0) document.getElementById('mobile-controls').style.display = 'flex'; }

document.getElementById('player-name').addEventListener('input', (e) => {
  if(e.target.value.trim().length > 0) document.getElementById('char-list').classList.remove('locked');
  else document.getElementById('char-list').classList.add('locked');
});

function checkNameLock() { if(document.getElementById('char-list').classList.contains('locked')) alert("Please type your Nickname first!"); }

window.onload = () => {
  checkMobileUI(); renderChars();
  const randomId = Math.floor(1000 + Math.random() * 9000);
  myPeerId = `SF-${randomId}`; peer = new Peer(myPeerId);
  peer.on('open', id => { document.getElementById('my-peer-id').innerText = id; });
  
  peer.on('connection', c => { 
    if(conn && conn.open) conn.close(); 
    conn = c; isHost = true; onlineMode = true; 
    setupDataListeners(); showStatus("Opponent Connected!", "success"); 
  });
  peer.on('error', err => { document.getElementById('my-peer-id').innerText = "Failed. Refresh."; });
};

function showStatus(text, type) {
  const el = document.getElementById('connection-status');
  el.style.display = 'block'; el.innerText = text;
  el.style.color = type === "error" ? "#ef4444" : "#4ade80";
}

function checkName() {
  const n = document.getElementById('player-name').value.trim();
  if(!n) { alert("Please type your Nickname in Step 1!"); return false; }
  myName = n; return true;
}

function connectToFriend() {
  if(!checkName()) return;
  const friendId = document.getElementById('join-id').value.toUpperCase().trim();
  if(!friendId) { showStatus("Paste an ID to join.", "error"); return; }
  
  if(peer) peer.destroy(); 
  peer = new Peer(); 
  peer.on('open', () => {
    showStatus("Searching...", "success");
    conn = peer.connect(friendId);
    isHost = false; onlineMode = true;
    setupDataListeners();
  });
  peer.on('error', err => showStatus("Session not found. Try again.", "error"));
}

function setupDataListeners() {
  conn.on('open', () => {
    conn.send({type: 'hello', name: myName});
    document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  });

  conn.on('data', data => {
    if (data.type === 'hello') {
      oppName = data.name; showStatus(`Connected to: ${oppName}!`, "success");
      if(isHost) { myName = document.getElementById('player-name').value.trim() || "Host"; conn.send({type: 'hello', name: myName}); }
    }
    if (data.type === 'ready') { p2Sel = CHARS.find(c => c.id === data.p2); if(p1Sel) sendStart(); }
    
    if (data.type === 'sync' && !isHost) {
      if(f1) f1.hp = data.hp1; if(f2) f2.hp = data.hp2; if(f3) f3.hp = data.hp3;
      if(f1 && Math.abs(f1.x - data.x1) > 25) f1.x = data.x1;
      if(f2 && Math.abs(f2.x - data.x2) > 25) f2.x = data.x2;
    }

    if (data.type === 'keys') { if (isHost) keys2 = data.keys; else keys1 = data.keys; }
    if (data.type === 'start') { 
      p1Sel = CHARS.find(c => c.id === data.p1); p2Sel = CHARS.find(c => c.id === data.p2); 
      activeMap = data.map; activeMode = data.mode; startFight(); 
    }
    if (data.type === 'gameover') { triggerKO(data.winner, false); }
    if (data.type === 'rematch') { resetToLobby(); }
  });
}

function renderChars(){
  const grid = document.getElementById('char-list');
  grid.innerHTML = '';
  CHARS.forEach(c=>{
    const div = document.createElement('div'); div.className = 'char-card';
    div.innerHTML = `<div class="char-icon" style="background-color:${c.suit}"><svg viewBox="0 0 24 24">${c.icon}</svg></div><span class="char-name">${c.name}</span><span class="char-power" style="color:${c.acc}">${c.power}</span>`;
    div.onclick = () => { if(!grid.classList.contains('locked')) selectChar(c, div); }
    grid.appendChild(div);
  });
}

function selectChar(c, el){
  if(onlineMode) {
    if(isHost) { 
      p1Sel = c; document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p1')); el.classList.add('selected-p1'); 
      if(p2Sel) sendStart(); 
    } else { 
      p2Sel = c; document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p2')); el.classList.add('selected-p2'); 
      conn.send({type:'ready', p2: p2Sel.id}); 
    }
  }
}

function pickAI() {
  if(!checkName()) return;
  aiMode = true; onlineMode = false; isHost = true;
  document.getElementById('char-list').classList.remove('locked');
  document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  document.getElementById('lobby-ui').style.display = 'none';
}

function sendStart() { 
  activeMap = document.getElementById('map-select').value; activeMode = document.getElementById('mode-select').value;
  conn.send({type:'start', p1: p1Sel.id, p2: p2Sel.id, map: activeMap, mode: activeMode}); 
  startFight(); 
}

function applySkin(fObj, sel) {
  const rig = document.getElementById(fObj.id);
  rig.querySelector('.f-head').style.background = sel.skin; rig.querySelector('.f-torso').style.background = sel.suit;
  rig.querySelectorAll('.f-limb').forEach(l => l.style.background = sel.acc);
}

function applyMap() {
  const m = MAPS[activeMap];
  document.getElementById('game-container').style.background = m.bg;
  const floor = document.getElementById('arena-floor');
  floor.style.backgroundColor = m.floor; floor.style.borderTopColor = m.grid;
  floor.style.backgroundImage = `linear-gradient(90deg, ${m.grid}40 1px, transparent 1px), linear-gradient(${m.grid}40 1px, transparent 1px)`;
}

function resetToLobby() {
  isGameOver = false;
  document.getElementById('victory-screen').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('select-screen').classList.add('active');
  p1Sel = null; p2Sel = null; keys = {}; keys1 = {}; keys2 = {};
  document.querySelectorAll('.char-card').forEach(c => { c.classList.remove('selected-p1', 'selected-p2'); });
  document.getElementById('vfx-layer').innerHTML = ''; 
}

function handleRematch() {
  resetToLobby();
  if(onlineMode && conn && conn.open) conn.send({type: 'rematch'});
}

function startFight(){
  isGameOver = false;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('arena-screen').classList.add('active');
  
  applyMap();
  
  document.getElementById('p1-tag').innerHTML = `${isHost ? myName : oppName} <span class="char-tag">(${p1Sel.name})</span>`;
  document.getElementById('p2-tag').innerHTML = `<span class="char-tag">(${p2Sel.name})</span> ${isHost ? oppName : myName}`;
  document.getElementById('hp-1').style.background = `linear-gradient(90deg, ${p1Sel.suit}, ${p1Sel.skin})`;
  document.getElementById('hp-2').style.background = `linear-gradient(90deg, ${p2Sel.suit}, ${p2Sel.skin})`;

  const aW = document.getElementById('game-container').offsetWidth;
  f1 = { id:'p1', x:50, y:0, vx:0, vy:0, hp:100, sp:0, dir:1, action:'idle', hit:false, w:40, maxW: aW, isBlocking: false, team: 1, buff: 0 };
  f2 = { id:'p2', x:aW - 90, y:0, vx:0, vy:0, hp:100, sp:0, dir:-1, action:'idle', hit:false, w:40, maxW: aW, isBlocking: false, team: activeMode === 'coop' ? 1 : 2, buff: 0 };
  
  applySkin(f1, p1Sel); applySkin(f2, p2Sel);

  if(activeMode === 'coop') {
    document.getElementById('boss-hud').style.display = 'block'; document.getElementById('p3').style.display = 'flex';
    f3 = { id:'p3', x: aW/2, y:0, vx:0, vy:0, hp:200, maxHp:200, sp:0, dir:-1, action:'idle', hit:false, w:60, maxW: aW, isBlocking: false, team: 2, buff: 0 }; 
  } else {
    document.getElementById('boss-hud').style.display = 'none'; document.getElementById('p3').style.display = 'none'; f3 = null;
  }
  requestAnimationFrame(gameLoop);
}

function triggerKO(winnerText, sendSignal = true) {
  if(isGameOver) return;
  isGameOver = true;
  document.getElementById('winner-name').innerText = winnerText;
  document.getElementById('victory-screen').style.display = 'flex';
  if(sendSignal && onlineMode && conn && conn.open) {
    conn.send({type: 'gameover', winner: winnerText});
  }
}

function gameLoop(){
  if(isGameOver) return;
  if(hitStopFrames > 0) { hitStopFrames--; requestAnimationFrame(gameLoop); return; }
  if(!f1 || !f2) return;

  if(onlineMode && conn && conn.open) {
    if(isHost) { 
      keys1 = keys; 
      conn.send({type: 'sync', hp1: f1.hp, hp2: f2.hp, hp3: f3?f3.hp:0, x1: f1.x, x2: f2.x});
    } else { keys2 = keys; }
    conn.send({type: 'keys', keys: keys});
  } else { keys1 = keys; }
  
  updateFighter(f1, f2, keys1, f3);
  updateFighter(f2, f1, keys2, f3);
  
  if(activeMode === 'coop' && f3 && f3.hp > 0) {
    if(isHost || !onlineMode) doBossAI(); 
    updateFighter(f3, f1, keys3, f2); 
    document.getElementById('hp-3').style.width = (f3.hp / f3.maxHp * 100) + '%';
  }
  draw();

  if(isHost || !onlineMode) {
    if(activeMode === 'coop') {
      if(f3 && f3.hp <= 0) { triggerKO("PLAYERS WIN!"); }
      else if(f1.hp <= 0 && f2.hp <= 0) { triggerKO("BOSS WINS!"); }
    } else {
      if(f1.hp <= 0 || f2.hp <= 0) { 
        let p1Name = isHost ? myName : oppName; let p2Name = isHost ? oppName : myName;
        const winner = f1.hp <= 0 ? p2Name : p1Name;
        triggerKO(`${winner} WINS!`); 
      }
    }
  }

  if(!isGameOver) requestAnimationFrame(gameLoop);
}

function updateFighter(f, opp, k, opp2){
  f.action = 'idle';
  f.maxW = document.getElementById('game-container').offsetWidth;

  if(k['b']) { f.isBlocking = true; f.vx *= 0.5; } 
  else {
    f.isBlocking = false;
    if(k['a']) { f.vx = -6; f.action = 'walk'; } else if(k['d']) { f.vx = 6; f.action = 'walk'; } else f.vx *= 0.8;
  }

  if(k['w'] && f.y === 0 && !f.isBlocking) { f.vy = -16; f.action = 'jump'; }
  f.x += f.vx; f.y += f.vy; f.vy += 0.9;
  if(f.y >= 0){ f.y=0; f.vy=0; }
  
  if(f.x < 0) f.x=0; if(f.x > f.maxW - f.w) f.x = f.maxW - f.w;
  
  let target = opp;
  if(opp2 && opp2.hp > 0) {
    const d1 = Math.abs(f.x - opp.x); const d2 = Math.abs(f.x - opp2.x);
    if(d2 < d1 && f.team !== opp2.team) target = opp2;
  }
  if(target && target.hp > 0) f.dir = (f.x < target.x) ? 1 : -1;
  
  if(!f.isBlocking) {
    if(k['j']) { attack(f, opp, opp2, 6, 45); f.action = 'punch'; }
    else if(k['k']) { attack(f, opp, opp2, 9, 55); f.action = 'kick'; }
    else if(k['l'] && f.sp >= 100) doSpecial(f, target);
  }
  
  f.sp = Math.min(100, f.sp + 0.15);
  if(f.buff > 0) f.buff--;
}

function triggerShake(type = 'normal') {
  const arena = document.getElementById('game-container');
  arena.classList.remove('shake-anim', 'shake-anim-heavy'); void arena.offsetWidth; 
  arena.classList.add(type === 'heavy' ? 'shake-anim-heavy' : 'shake-anim');
}

function spawnParticles(x, y, dir, color = '#fbbf24') {
  for(let i=0; i<6; i++) {
    const p = document.createElement('div'); p.className = 'particle'; p.style.background = color; p.style.boxShadow = `0 0 15px ${color}`;
    document.getElementById('arena').appendChild(p);
    let vx = dir * (Math.random() * 8 + 4); let vy = (Math.random() - 1) * 12; let life = 20;
    let cx = x + 20; let cy = y - 40;
    const anim = () => {
      if(life <= 0 || isGameOver) { p.remove(); return; }
      cx += vx; cy += vy; vy += 1; p.style.transform = `translate(${cx}px, ${cy}px)`; p.style.opacity = life / 20;
      life--; requestAnimationFrame(anim);
    }; requestAnimationFrame(anim);
  }
}

function createVFX(type, x, y, color) {
  const layer = document.getElementById('vfx-layer');
  const vfx = document.createElement('div');
  vfx.classList.add('vfx-base', `vfx-${type}`);
  vfx.style.setProperty('--vx', `${x + 20}px`);
  vfx.style.setProperty('--vy', `${y - 40}px`);

  if(type === 'ring') {
    vfx.style.border = `5px solid ${color}`; vfx.style.width = '100px'; vfx.style.height = '100px';
    vfx.style.setProperty('--vx', `${x - 30}px`); vfx.style.setProperty('--vy', `${y - 90}px`);
  } else if (type === 'acid') {
    vfx.style.setProperty('--vx', `${x - 70}px`);
  } else if (type === 'text') {
    vfx.style.color = color; vfx.innerText = "CALCULATED.";
  }
  layer.appendChild(vfx);
  setTimeout(() => { if(layer.contains(vfx)) vfx.remove(); }, 1500);
}

function attack(f, o1, o2, dmg, range){
  if(f.hit) return; f.hit = true; setTimeout(()=>f.hit=false, f.id === 'p3' ? 600 : 300);
  [o1, o2].forEach(opp => {
    if(!opp || opp.hp <= 0 || f.team === opp.team) return;
    const dist = Math.abs((f.x + f.w/2) - (opp.x + opp.w/2));
    if(dist < range + f.w/2 + opp.w/2){
      triggerShake(); spawnParticles(opp.x, opp.y, f.dir); hitStopFrames = 4;
      if(opp.isBlocking) {
        showLabel(opp.id, "BLOCKED!", "#a1a1aa");
      } else {
        opp.hp -= dmg; opp.vx = f.dir * 10;
        if(f.id === 'p3') { opp.vx = f.dir * 18; opp.vy = -6; showLabel(opp.id, `-${dmg} SLAM!`, "#ef4444"); }
        else { showLabel(opp.id, `-${dmg} DMG!`, "#ef4444"); }
      }
    }
  });
}

function doSpecial(f, opp){
  if(!opp) return; f.sp = 0; hitStopFrames = 8;
  const charId = (f.id === 'p1' ? p1Sel : p2Sel).id;
  
  if (charId === 'sham') { 
    showLabel(f.id, "DEADEYE", "#dc2626"); createVFX('crosshair', opp.x, opp.y, '#dc2626');
    hitStopFrames = 25; // Dramatic pause
    setTimeout(() => { 
      createVFX('ring', opp.x, opp.y, '#dc2626'); 
      if(!opp.isBlocking) { opp.hp -= 35; opp.vx = f.dir * 30; } else { opp.hp -= 10; }
      triggerShake('heavy'); spawnParticles(opp.x, opp.y, f.dir, '#dc2626');
    }, 400); 
  } else if (charId === 'parv') { 
    showLabel(f.id, "DHOL WAVE!", "#ea580c"); createVFX('ring', f.x, f.y, '#ea580c');
    setTimeout(() => { if(!opp.isBlocking) { opp.hp -= 25; opp.vx = f.dir * 25; } triggerShake('heavy'); }, 200);
  } else if (charId === 'andi') { 
    showLabel(f.id, "HULK OUT!", "#22c55e"); f.buff = 300; f.hp = Math.min(100, f.hp + 15); triggerShake(); spawnParticles(f.x, f.y, 1, '#22c55e');
  } else if (charId === 'jz') { 
    showLabel(f.id, "RHYTHM DASH!", "#ec4899"); let count = 0;
    const dash = setInterval(() => {
      f.x += f.dir * 45; spawnParticles(f.x, f.y, f.dir * -1, '#ec4899'); triggerShake('heavy');
      if(Math.abs(f.x - opp.x) < 70 && !opp.isBlocking) { opp.hp -= 10; opp.vx = f.dir * 10; }
      if(++count > 2) clearInterval(dash);
    }, 180);
  } else if (charId === 'yiliang') { 
    showLabel(f.id, "SMOKE VANISH!", "#94a3b8"); createVFX('smoke', f.x, f.y, '#94a3b8');
    f.x = opp.x - (opp.dir * 60); createVFX('smoke', f.x, f.y, '#94a3b8');
    setTimeout(() => { if(!opp.isBlocking) { opp.hp -= 30; opp.vx = f.dir * 15; } triggerShake('heavy'); }, 300);
  } else if (charId === 'dexter') { 
    showLabel(f.id, "ACID SPIT!", "#22c55e"); createVFX('acid', opp.x, opp.y, '#22c55e');
    if(!opp.isBlocking) { opp.hp -= 20; opp.vx = f.dir * 5; }
  } else if (charId === 'karthik') { 
    showLabel(f.id, "67 BURST!", "#4f46e5"); let count = 0;
    const flurry = setInterval(() => {
      if(!opp.isBlocking) opp.hp -= 2; triggerShake(); spawnParticles(opp.x, opp.y, f.dir, '#4f46e5');
      if(++count > 5) { clearInterval(flurry); if(!opp.isBlocking){ opp.hp -= 15; opp.vx = f.dir * 20;} createVFX('ring', opp.x, opp.y, '#4f46e5'); triggerShake('heavy'); }
    }, 100);
  } else if (charId === 'jerell') { 
    showLabel(f.id, "CALCULATED.", "#22c55e"); createVFX('text', f.x, f.y, '#22c55e');
    setTimeout(() => { if(!opp.isBlocking) { opp.hp -= 28; opp.vx = f.dir * 10; } triggerShake('heavy'); }, 400);
  } else { 
    showLabel(f.id, "SPECIAL!", "#fbbf24"); if(!opp.isBlocking) { opp.hp -= 20; opp.vx = f.dir * 20; } triggerShake(); spawnParticles(opp.x, opp.y, f.dir);
  }
}

function showLabel(pid, txt, color){
  const l = document.getElementById(pid+'-label'); l.innerText = txt; l.style.color = color;
  l.classList.add('show'); setTimeout(()=>l.classList.remove('show'), 800);
}

function draw(){
  const t = Date.now() / 100;
  const updateF = (f, el) => {
    if(f.hp <= 0 && !isGameOver) { el.style.opacity = '0.3'; } else { el.style.opacity = '1'; } 
    let scale = f.id === 'p3' ? 1.6 : (((f.id==='p1'?p1Sel:p2Sel).id === 'andi' && f.buff > 0) ? 1.4 : 1);
    
    el.style.transform = `translate(${f.x}px, ${f.y}px)`; el.querySelector('.f-rig').style.transform = `scaleX(${f.dir * scale}) scaleY(${scale})`;
    
    let aF = 20, aB = -10, lF = 10, lB = -10, j_aF = -40, j_aB = -30, j_lF = 20, j_lB = 10; 
    if(f.action === 'punch') { aF = -90; j_aF = 0; aB = 20; j_aB = -60; lF = -20; j_lF = 30; }
    else if(f.action === 'kick') { lF = -100; j_lF = 0; aF = 40; j_aF = -40; aB = -40; j_aB = -20; lB = 10; j_lB = 20; }
    else if(f.action === 'walk') {
      aF = Math.sin(t) * -40; j_aF = -20 + Math.sin(t) * -20; aB = Math.sin(t) * 40; j_aB = -20 - Math.sin(t) * -20;
      lF = Math.sin(t) * -50; j_lF = Math.max(0, Math.sin(t) * 40); lB = Math.sin(t) * 50; j_lB = Math.max(0, -Math.sin(t) * 40);
    } else { const bob = Math.sin(t*2) * 2; el.querySelector('.f-rig').style.transform += ` translateY(${bob}px)`; }
    
    el.querySelector('.f-arm-f').style.transform = `rotate(${aF}deg)`; el.querySelector('.f-arm-b').style.transform = `rotate(${aB}deg)`;
    el.querySelector('.f-leg-f').style.transform = `rotate(${lF}deg)`; el.querySelector('.f-leg-b').style.transform = `rotate(${lB}deg)`;
    el.querySelector('.f-arm-f').style.setProperty('--joint', `${j_aF}deg`); el.querySelector('.f-arm-b').style.setProperty('--joint', `${j_aB}deg`);
    el.querySelector('.f-leg-f').style.setProperty('--joint', `${j_lF}deg`); el.querySelector('.f-leg-b').style.setProperty('--joint', `${j_lB}deg`);

    if(f.isBlocking) {
      el.querySelector('.f-arm-f').style.transform = `rotate(-140deg) translate(5px, -5px)`; el.querySelector('.f-arm-b').style.transform = `rotate(140deg)`;
      el.querySelector('.f-torso').classList.add('block-aura');
    } else { el.querySelector('.f-torso').classList.remove('block-aura'); }

    if(f.hit) el.classList.add('hurt'); else el.classList.remove('hurt');
  };
  updateF(f1, document.getElementById('p1')); updateF(f2, document.getElementById('p2')); if(f3) updateF(f3, document.getElementById('p3'));
  document.getElementById('hp-1').style.width = Math.max(0, f1.hp) + '%'; document.getElementById('hp-2').style.width = Math.max(0, f2.hp) + '%';
  document.getElementById('sp-1').style.width = f1.sp + '%'; document.getElementById('sp-2').style.width = f2.sp + '%';
}

function doBossAI(){
  let target = f1;
  if(f1.hp <= 0) target = f2; else if(f2.hp > 0 && Math.abs(f3.x - f2.x) < Math.abs(f3.x - f1.x)) target = f2;
  const dist = Math.abs(f3.x - target.x);
  if (dist > 80) { keys3['a'] = f3.x > target.x; keys3['d'] = f3.x < target.x; } 
  else { keys3['a'] = false; keys3['d'] = false; keys3['j'] = Math.random() < 0.03; keys3['k'] = Math.random() < 0.02; } 
}

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; }); document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
function bindTouch(id, k) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; btn.classList.add('pressed'); }, {passive: false});
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[k] = false; btn.classList.remove('pressed'); }, {passive: false});
}
bindTouch('btn-left', 'a'); bindTouch('btn-right', 'd'); bindTouch('btn-up', 'w'); bindTouch('btn-block', 'b'); bindTouch('btn-punch', 'j'); bindTouch('btn-kick', 'k'); bindTouch('btn-sp', 'l');
</script>
