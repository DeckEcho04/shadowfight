<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shadow Fight — Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 16px 8px; overflow-x: hidden; }
  #app { width: 100%; max-width: 680px; }
  .version-badge { font-size: 10px; color: rgba(255,255,255,0.25); text-align: right; padding: 0 4px 6px; }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* IMPROVED LOBBY UI */
  #lobby-ui { background: #1a1a2e; padding: 20px; border-radius: 12px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); color: white; text-align: center; }
  .input-group { margin-bottom: 12px; text-align: left; }
  .input-group label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 10px; background: #0d0d1f; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-size: 14px; outline: none; }
  input:focus { border-color: #4f46e5; }
  button { width: 100%; padding: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
  button:hover { background: #6366f1; }
  
  .id-box { background: rgba(79, 70, 229, 0.1); border: 1px dashed #4f46e5; padding: 10px; border-radius: 6px; margin: 15px 0; }
  .my-id { font-family: monospace; color: #818cf8; font-weight: bold; font-size: 18px; letter-spacing: 1px; }
  
  #connection-status { font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 6px; display: none; font-weight: bold; }
  .status-success { background: rgba(74, 222, 128, 0.2); color: #4ade80; border: 1px solid #4ade80; }
  .status-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }

  /* CHAR SELECT */
  .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; color: #fff; }
  .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .char-card { background: #1a1a2e; border-radius: 10px; border: 2px solid transparent; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; opacity: 0.5; pointer-events: none; }
  .char-card.unlocked { opacity: 1; pointer-events: auto; }
  .char-card.selected-p1 { border-color: #4f46e5; background: #1e1e3f; }
  .char-card.selected-p2 { border-color: #ef4444; background: #3f1e1e; }
  .char-emoji { font-size: 32px; margin-bottom: 8px; display: block; }
  .char-name { font-size: 14px; font-weight: 600; color: #fff; display: block; }
  .char-power { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px; display: block; }
  
  /* ARENA */
  #game-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background: #16213e; border-radius: 12px; overflow: hidden; border: 2px solid #1a1a2e; }
  #arena { width: 100%; height: 100%; background: linear-gradient(to bottom, #16213e, #0f3460); position: relative; }
  .floor { position: absolute; bottom: 0; width: 100%; height: 20px; background: #0a0a1a; }
  
  .hud { position: absolute; top: 0; width: 100%; padding: 12px; display: flex; justify-content: space-between; z-index: 10; }
  .player-tag { font-size: 10px; color: rgba(255,255,255,0.8); margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }
  .hp-bar-bg { width: 45%; height: 14px; background: rgba(0,0,0,0.5); border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
  .hp-bar-fill { height: 100%; transition: width 0.2s; }
  .hp-p1 { background: linear-gradient(90deg, #4f46e5, #818cf8); width: 100%; }
  .hp-p2 { background: linear-gradient(90deg, #f87171, #ef4444); width: 100%; }
  .sp-bar-bg { width: 45%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 3px; margin-top: 4px; }
  .sp-bar-fill { height: 100%; width: 0%; background: #fbbf24; transition: width 0.2s; }

  .fighter { position: absolute; bottom: 20px; transition: transform 0.1s; }
  .fighter-body { position: relative; width: 100%; height: 100%; border-radius: 4px; }
  .hurt { animation: flash 0.1s; }
  @keyframes flash { from { opacity: 0.5; } to { opacity: 1; } }

  .special-label { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: #fbbf24; font-weight: bold; font-size: 12px; white-space: nowrap; pointer-events: none; opacity: 0; transition: 0.5s; }
  .special-label.show { opacity: 1; top: -50px; }

  /* MOBILE CONTROLS */
  #mobile-controls { display: none; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
  .d-pad, .action-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .touch-btn { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); color: #fff; height: 50px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; }
  .touch-btn.pressed { background: #334155; transform: scale(0.95); }
  .btn-sp { border-color: #fbbf24; color: #fbbf24; }

  @media (max-width: 600px) { #mobile-controls { display: grid; } }
</style>
</head>
<body>

<div id="app">
  <div class="version-badge">v0.3.2 (Lobby Update)</div>

  <div id="select-screen" class="screen active">
    
    <div id="lobby-ui">
      <div class="input-group">
        <label>Step 1: What is your name?</label>
        <input type="text" id="player-name" placeholder="e.g. Parv" maxlength="12">
      </div>
      
      <div class="id-box">
        <div class="id-label">Your Session ID (Give to friend):</div>
        <div class="my-id" id="my-peer-id">Generating...</div>
      </div>
      
      <div class="input-group" style="margin-top: 15px;">
        <label>Step 2: Join a friend (Leave blank if you are hosting)</label>
        <input type="text" id="join-id" placeholder="Paste Session ID here" style="text-transform: uppercase;">
        <button onclick="connectToFriend()">Connect</button>
      </div>
      
      <div id="connection-status"></div>
    </div>

    <div class="header">
      <h2 id="select-title">Choose Your Fighter</h2>
      <button onclick="pickAI()" style="width:auto; padding:6px 12px; font-size:12px; background:rgba(255,255,255,0.1); margin-top:0;">Play Solo (vs AI)</button>
    </div>
    <div class="char-grid" id="char-list"></div>
  </div>

  <div id="arena-screen" class="screen">
    <div id="game-container">
      <div class="hud">
        <div style="width: 45%;">
          <div id="p1-tag" class="player-tag">Player 1</div>
          <div class="hp-bar-bg"><div id="hp-1" class="hp-bar-fill hp-p1"></div></div>
          <div class="sp-bar-bg"><div id="sp-1" class="sp-bar-fill"></div></div>
        </div>
        <div style="width: 45%; text-align: right;">
          <div id="p2-tag" class="player-tag">Player 2</div>
          <div class="hp-bar-bg" style="margin-left:auto;"><div id="hp-2" class="hp-bar-fill hp-p2"></div></div>
          <div class="sp-bar-bg" style="margin-left:auto;"><div id="sp-2" class="sp-bar-fill"></div></div>
        </div>
      </div>
      <div id="arena">
        <div id="p1" class="fighter"><div class="fighter-body" id="p1-b"></div><div class="special-label" id="p1-label">SPECIAL!</div></div>
        <div id="p2" class="fighter"><div class="fighter-body" id="p2-b"></div><div class="special-label" id="p2-label">SPECIAL!</div></div>
        <div class="floor"></div>
      </div>
    </div>
    <div id="mobile-controls">
      <div class="d-pad"><div class="touch-btn" id="tb-left">←</div><div class="touch-btn" id="tb-jump">↑</div><div class="touch-btn" id="tb-right">→</div></div>
      <div class="action-pad"><div class="touch-btn" id="tb-punch">P</div><div class="touch-btn" id="tb-kick">K</div><div class="touch-btn btn-sp" id="tb-sp">S</div></div>
    </div>
    <button onclick="location.reload()" style="margin-top:20px; background:transparent; border:1px solid rgba(255,255,255,0.1); color:#888;">Disconnect & Exit</button>
  </div>
</div>

<script>
const CHARS = [
  { id:'karthik', name:'Karthik', emoji:'⚡', power:'67 Burst', color:'#4f46e5', h:70, w:45 },
  { id:'andi', name:'Andi', emoji:'🤢', power:'Hulk Out', color:'#22c55e', h:70, w:45 },
  { id:'jz', name:'JZ', emoji:'🎧', power:'Rhythm Dash', color:'#ec4899', h:70, w:45 },
  { id:'dexter', name:'Dexter', emoji:'🧪', power:'Acid Spit', color:'#a855f7', h:70, w:45 },
  { id:'yiliang', name:'Yi Liang', emoji:'💨', power:'Smoke Vanish', color:'#94a3b8', h:70, w:45 },
  { id:'sherman', name:'Sherman', emoji:'🍺', power:'Drunken Sip', color:'#f59e0b', h:70, w:45 },
  { id:'parveer', name:'Parveer', emoji:'🥁', power:'Dhol Wave', color:'#ea580c', h:70, w:45 },
  { id:'hari', name:'Hari', emoji:'😴', power:'Sleepwalk', color:'#60a5fa', h:70, w:45 },
  { id:'jerell', name:'Jerell', emoji:'🤓', power:'IQ Strike', color:'#ffffff', h:70, w:45 }
];

let peer, conn, myPeerId, isHost = false, onlineMode = false;
let myName = "Player", oppName = "Opponent";
let p1Sel=null, p2Sel=null, aiMode=false, f1, f2;
let keys1 = {}, keys2 = {}, keys = {};

window.onload = () => {
  const randomId = Math.floor(100 + Math.random() * 900);
  myPeerId = `SF-${randomId}`;
  peer = new Peer(myPeerId);
  
  peer.on('open', id => { document.getElementById('my-peer-id').innerText = id; });
  
  // Handle incoming connections (When YOU are the host)
  peer.on('connection', c => {
    conn = c; isHost = true; onlineMode = true;
    setupDataListeners();
    showStatus("Connecting...", "success");
  });

  // Handle errors (like bad ID)
  peer.on('error', err => {
    if(err.type === 'peer-unavailable') {
      showStatus("Error: Session ID not found.", "error");
    } else {
      showStatus("Connection error.", "error");
    }
  });

  renderChars();
};

function showStatus(text, type) {
  const el = document.getElementById('connection-status');
  el.style.display = 'block';
  el.innerText = text;
  el.className = type === "error" ? "status-error" : "status-success";
}

function getMyName() {
  const input = document.getElementById('player-name').value.trim();
  return input !== "" ? input : (isHost ? "Host" : "Challenger");
}

function connectToFriend() {
  const friendId = document.getElementById('join-id').value.toUpperCase().trim();
  if(!friendId) {
    showStatus("Please enter an ID to join.", "error");
    return;
  }
  showStatus("Searching for session...", "success");
  conn = peer.connect(friendId);
  isHost = false; onlineMode = true;
  setupDataListeners();
}

function setupDataListeners() {
  conn.on('open', () => {
    myName = getMyName();
    // Send our name to the other player immediately
    conn.send({type: 'hello', name: myName});
    
    // Unlock characters once connected
    document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  });

  conn.on('data', data => {
    if (data.type === 'hello') {
      oppName = data.name;
      showStatus(`Connected to: ${oppName}! Pick your character.`, "success");
      // If we received a hello, make sure they get ours if we haven't sent it
      if(isHost) {
        myName = getMyName();
        conn.send({type: 'hello', name: myName});
        document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
      }
    }
    if (data.type === 'keys') { if (isHost) keys2 = data.keys; else keys1 = data.keys; }
    if (data.type === 'start') {
      p1Sel = CHARS.find(c => c.id === data.p1);
      p2Sel = CHARS.find(c => c.id === data.p2);
      startFight();
    }
  });
}

// Enable Solo play immediately
function pickAI() {
  aiMode = true; onlineMode = false;
  document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  document.getElementById('lobby-ui').style.display = 'none';
  document.getElementById('select-title').innerText = "Pick your fighter to start";
}

function renderChars(){
  const grid = document.getElementById('char-list');
  grid.innerHTML = "";
  CHARS.forEach(c=>{
    const div = document.createElement('div');
    div.className = 'char-card';
    div.innerHTML = `<span class="char-emoji">${c.emoji}</span><span class="char-name">${c.name}</span><span class="char-power">${c.power}</span>`;
    div.onclick = () => selectChar(c, div);
    grid.appendChild(div);
  });
}

function selectChar(c, el){
  if(onlineMode) {
    if(isHost) {
      p1Sel = c;
      document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p1'));
      el.classList.add('selected-p1');
      if(p2Sel) sendStart();
    } else {
      p2Sel = c;
      document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p2'));
      el.classList.add('selected-p2');
      conn.send({type:'ready', p2: p2Sel.id});
    }
    return;
  }
  // Offline / AI selection
  if(!p1Sel){ p1Sel=c; el.classList.add('selected-p1'); } 
  if(aiMode) {
    const others = CHARS.filter(char => char.id !== p1Sel.id);
    p2Sel = others[Math.floor(Math.random() * others.length)];
    myName = getMyName();
    oppName = "AI Bot";
    startFight();
  }
}

function sendStart() {
  conn.send({type:'start', p1: p1Sel.id, p2: p2Sel.id});
  startFight();
}

function startFight(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('arena-screen').classList.add('active');
  
  // Set Names on HUD
  if(onlineMode) {
    document.getElementById('p1-tag').innerText = isHost ? myName : oppName;
    document.getElementById('p2-tag').innerText = isHost ? oppName : myName;
  } else {
    document.getElementById('p1-tag').innerText = myName;
    document.getElementById('p2-tag').innerText = oppName;
  }

  f1 = { id:'p1', x:100, y:0, vx:0, vy:0, hp:100, sp:0, w:p1Sel.w, h:p1Sel.h, color:p1Sel.color, dir:1, state:'idle', jump:false, hit:false, lastHits:0, acid:0, buff:0, parry:false };
  f2 = { id:'p2', x:500, y:0, vx:0, vy:0, hp:100, sp:0, w:p2Sel.w, h:p2Sel.h, color:p2Sel.color, dir:-1, state:'idle', jump:false, hit:false, lastHits:0, acid:0, buff:0, parry:false };
  document.getElementById('p1-b').style.backgroundColor = f1.color;
  document.getElementById('p2-b').style.backgroundColor = f2.color;
  requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(!f1 || !f2) return;
  if(onlineMode && conn && conn.open) {
    conn.send({type: 'keys', keys: keys});
    if(isHost) { keys1 = keys; } else { keys2 = keys; }
  } else { keys1 = keys; }
  updateFighter(f1, f2, keys1);
  updateFighter(f2, f1, aiMode ? {} : keys2);
  if(aiMode) doAI();
  draw();
  if(f1.hp > 0 && f2.hp > 0) requestAnimationFrame(gameLoop);
}

function updateFighter(f, opp, k){
  if(k['a']) f.vx = -4; else if(k['d']) f.vx = 4; else f.vx *= 0.8;
  if(k['w'] && !f.jump) { f.vy = -12; f.jump = true; }
  f.x += f.vx; f.y += f.vy; f.vy += 0.6;
  if(f.y >= 0){ f.y=0; f.vy=0; f.jump=false; }
  if(f.x < 0) f.x=0; if(f.x > 630) f.x=630;
  f.dir = (f.x < opp.x) ? 1 : -1;
  if(k['j']) attack(f, opp, 5, 20);
  if(k['k']) attack(f, opp, 8, 30);
  if(k['l'] && f.sp >= 100) doSpecial(f, opp);
  if(f.acid > 0 && Math.random() < 0.05) { f.hp -= 1; f.acid--; }
  if(f.buff > 0) f.buff--; else { f.w = (f.id==='p1'?p1Sel:p2Sel).w; f.h = (f.id==='p1'?p1Sel:p2Sel).h; }
  f.sp = Math.min(100, f.sp + 0.1);
}

function attack(f, opp, dmg, range){
  if(f.hit) return; f.hit = true; setTimeout(()=>f.hit=false, 300);
  const dist = Math.abs((f.x + f.w/2) - (opp.x + opp.w/2));
  if(dist < range + f.w/2 + opp.w/2){
    if(opp.parry){ f.hp -= 10; opp.parry=false; return;}
    let finalDmg = dmg * (f.buff > 0 ? 1.6 : 1);
    opp.hp -= finalDmg; opp.vx = f.dir * 5;
  }
}

function doSpecial(f, opp){
  const char = (f.id==='p1' ? p1Sel : p2Sel).id;
  f.sp = 0;
  showLabel(f.id, "SPECIAL: " + char.toUpperCase() + "!");
  switch(char){
    case 'andi': f.buff = 240; f.w=60; f.h=90; break;
    case 'jz': let i=0; let itv = setInterval(()=>{ f.x += f.dir * 40; attack(f, opp, 10, 40); if(++i > 3) clearInterval(itv); }, 100); break;
    case 'dexter': opp.acid = 200; break;
    case 'yiliang': f.x = opp.x - (f.dir * 40); setTimeout(()=>attack(f,opp,15,50), 100); break;
    case 'sherman': f.hp = Math.min(100, f.hp+20); attack(f, opp, 15, 40); break;
    case 'parveer': opp.hp -= 22; opp.vx = f.dir * 25; break;
    case 'hari': f.parry = true; setTimeout(()=>f.parry=false, 2000); break;
    case 'jerell': let j=0; let jitv = setInterval(()=>{ attack(f, opp, 12, 40); if(++j > 3) clearInterval(jitv); }, 150); break;
    case 'karthik': opp.hp -= 15; opp.vx = f.dir * 10; break;
  }
}

function showLabel(pid, txt){
  const l = document.getElementById(pid+'-label');
  l.innerText = txt; l.classList.add('show');
  setTimeout(()=>l.classList.remove('show'), 1500);
}

function draw(){
  const updateF = (f, el) => {
    el.style.transform = `translate(${f.x}px, ${f.y}px)`;
    const b = el.querySelector('.fighter-body');
    b.style.width = f.w + 'px'; b.style.height = f.h + 'px';
    if(f.hit) b.classList.add('hurt'); else b.classList.remove('hurt');
  };
  updateF(f1, document.getElementById('p1'));
  updateF(f2, document.getElementById('p2'));
  document.getElementById('hp-1').style.width = f1.hp + '%';
  document.getElementById('hp-2').style.width = f2.hp + '%';
  document.getElementById('sp-1').style.width = f1.sp + '%';
  document.getElementById('sp-2').style.width = f2.sp + '%';
}

function doAI(){
  const dist = Math.abs(f1.x - f2.x);
  if (dist > 60) { keys2['a'] = f2.x > f1.x; keys2['d'] = f2.x < f1.x; } 
  else { keys2['a'] = false; keys2['d'] = false; keys2['j'] = Math.random() < 0.1; }
  if(f2.sp >= 100) keys2['l'] = true; else keys2['l'] = false;
}

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function bindTouch(id, k) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; btn.classList.add('pressed'); });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[k] = false; btn.classList.remove('pressed'); });
}
bindTouch('tb-left', 'a'); bindTouch('tb-right', 'd'); bindTouch('tb-jump', 'w');
bindTouch('tb-punch', 'j'); bindTouch('tb-kick', 'k'); bindTouch('tb-sp', 'l');
</script>
</body>
</html>
