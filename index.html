<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shadow Fight — Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100dvh; width: 100vw; overflow-x: hidden; overflow-y: auto; touch-action: pan-y; }
  
  #app { min-height: 100dvh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px 10px; position: relative; }
  .version-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.3); z-index: 100; }

  .screen { display: none; width: 100%; max-width: 900px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
  #arena-screen.active { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; padding: 0; background: #000; overflow: hidden; touch-action: none; justify-content: center; z-index: 999;}

  /* LOBBY UI */
  #lobby-ui { background: rgba(17, 17, 34, 0.95); padding: 20px; border-radius: 16px; margin: 0 auto 20px; border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2); text-align: center; max-width: 600px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
  .lobby-row { display: flex; gap: 15px; margin-bottom: 15px; text-align: left; align-items: flex-end;}
  .input-group { flex: 1; display: flex; flex-direction: column; }
  .input-group label { font-size: 11px; color: #cbd5e1; margin-bottom: 6px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  input, select { padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); text-transform: uppercase;}
  input:focus { border-color: #6366f1; }
  input::placeholder { text-transform: none; }
  select { cursor: pointer; }
  button { padding: 14px; background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); text-transform: uppercase; letter-spacing: 1px; }
  button:active { transform: scale(0.96); }
  
  .id-box { background: rgba(79, 70, 229, 0.1); border: 1px dashed #6366f1; padding: 15px; border-radius: 8px; margin: 15px 0; display: flex; justify-content: space-between; align-items: center; box-shadow: inset 0 0 20px rgba(79, 70, 229, 0.1); }
  .my-id { font-family: monospace; color: #a5b4fc; font-weight: bold; font-size: 28px; letter-spacing: 4px; text-shadow: 0 0 10px rgba(99, 102, 241, 0.5); }
  #connection-status { font-size: 14px; margin-top: 15px; padding: 10px; border-radius: 6px; display: none; font-weight: bold; }

  /* CHAR SELECT */
  .header { display: flex; justify-content: space-between; align-items: center; margin: 0 auto 15px; max-width: 800px; width: 100%; }
  .header h2 { font-weight: 900; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  .char-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; max-width: 800px; margin: 0 auto; width: 100%; transition: opacity 0.3s; }
  @media (max-width: 768px) { .char-grid { grid-template-columns: repeat(3, 1fr); } }
  .char-grid.locked { opacity: 0.3; filter: grayscale(100%); pointer-events: none; }
  .char-card { background: linear-gradient(180deg, #1e1e3f 0%, #111122 100%); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 15px 10px; text-align: center; cursor: pointer; opacity: 0.5; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
  .char-card.unlocked { opacity: 1; pointer-events: auto; }
  .char-card.selected-p1 { border-color: #6366f1; background: linear-gradient(180deg, #312e81 0%, #1e1b4b 100%); transform: scale(1.05); z-index: 2; position: relative; }
  .char-card.selected-p2 { border-color: #ef4444; background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%); transform: scale(1.05); z-index: 2; position: relative; }
  .char-name { font-size: 15px; font-weight: 900; display: block; margin-top: 8px;}
  .char-power { font-size: 10px; margin-top: 2px; display: block; font-weight: 800; text-transform: uppercase;}
  .char-icon { width: 50px; height: 50px; margin: 0 auto; border-radius: 14px; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.4) 100%); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .char-icon svg { width: 28px; height: 28px; fill: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); z-index: 2; }

  @keyframes shake { 0%{transform:translate(6px,3px);} 25%{transform:translate(-5px,-6px);} 50%{transform:translate(-8px,0px);} 75%{transform:translate(5px,6px);} 100%{transform:translate(0,0);} }
  .shake-anim { animation: shake 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
  @keyframes shakeHeavy { 0%{transform:translate(15px,10px) rotate(2deg);} 25%{transform:translate(-15px,-12px) rotate(-2deg);} 50%{transform:translate(-20px,5px) rotate(1deg);} 75%{transform:translate(15px,15px) rotate(0deg);} 100%{transform:translate(0,0);} }
  .shake-anim-heavy { animation: shakeHeavy 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

  /* ARENA & VIVID BACKGROUNDS */
  #game-container { position: relative; width: 100%; flex: 1; overflow: hidden; display: flex; flex-direction: column; max-height: 800px; background-size: cover; background-position: center bottom; }
  #arena { position: absolute; width: 100%; height: 100%; perspective: 1000px; }
  
  .bg-sun { position: absolute; border-radius: 50%; display: none; z-index: 1;}
  .bg-horizon { position: absolute; bottom: 35%; width: 100%; height: 20%; display: none; z-index: 2;}
  
  #scroll-world { position: absolute; width: 10000px; height: 100%; top: 0; left: 0; transform-origin: left; z-index: 5;}
  .floor { position: absolute; bottom: 0; width: 100%; height: 40%; transform: rotateX(75deg); transform-origin: top; box-shadow: 0 -30px 60px rgba(0,0,0,0.9); }
  
  #pits-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; pointer-events: none;}
  .pit { position: absolute; bottom: 0; height: 40%; background: #000; z-index: 6; border-top: 10px solid #05050a; box-shadow: inset 0 30px 30px rgba(0,0,0,1); }
  .finish-line { position: absolute; bottom: 40%; width: 30px; height: 300px; background: repeating-linear-gradient(45deg, #fff, #fff 15px, #000 15px, #000 30px); z-index: 10; box-shadow: 0 0 20px rgba(255,255,255,0.5);}

  #vfx-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; overflow: hidden;}
  .vfx-base { position: absolute; bottom: 25%; pointer-events: none; z-index: 15; }
  .vfx-ring { border-radius: 50%; opacity: 1; animation: explodeRing 0.4s ease-out forwards; }
  @keyframes explodeRing { 0% { transform: translate(var(--vx), var(--vy)) scale(0); border-width: 15px; } 100% { transform: translate(var(--vx), var(--vy)) scale(3.5); opacity: 0; border-width: 0px; } }
  .vfx-acid { background: rgba(34, 197, 94, 0.5); border-radius: 50%; transform: translate(var(--vx), calc(var(--vy) + 60px)) rotateX(70deg); box-shadow: 0 0 30px #22c55e, inset 0 0 30px #22c55e; filter: blur(2px); width: 180px; height: 50px; }
  .vfx-smoke { width: 180px; height: 180px; background: radial-gradient(circle, rgba(148,163,184,1) 0%, rgba(245, 158, 11,0.8) 40%, transparent 70%); border-radius: 50%; opacity: 1; animation: smokePoof 0.8s ease-out forwards; filter: blur(10px); mix-blend-mode: screen; }
  @keyframes smokePoof { 0% { transform: translate(var(--vx), var(--vy)) scale(0.2); opacity: 1; } 100% { transform: translate(var(--vx), var(--vy)) scale(2.5); opacity: 0; } }
  .vfx-crosshair { width: 80px; height: 80px; border: 6px solid #dc2626; border-radius: 50%; opacity: 0; animation: lockOn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; box-shadow: 0 0 15px #dc2626, inset 0 0 15px #dc2626;}
  .vfx-crosshair::before, .vfx-crosshair::after { content: absolute; background: #dc2626; box-shadow: 0 0 8px #dc2626;}
  .vfx-crosshair::before { top: 50%; left: -20px; right: -20px; height: 6px; margin-top: -3px; }
  .vfx-crosshair::after { left: 50%; top: -20px; bottom: -20px; width: 6px; margin-left: -3px; }
  @keyframes lockOn { 0% { transform: translate(var(--vx), var(--vy)) scale(4) rotate(90deg); opacity: 0; } 100% { transform: translate(var(--vx), var(--vy)) scale(1) rotate(0deg); opacity: 1; } }
  .vfx-projectile { width: 35px; height: 35px; border-radius: 50%; animation: flyAcross 0.4s linear forwards; display: flex; align-items: center; justify-content: center; font-size: 30px;}
  @keyframes flyAcross { 0% { transform: translate(var(--start-x), var(--start-y)) rotate(0deg); } 100% { transform: translate(var(--end-x), var(--end-y)) rotate(360deg); } }
  .vfx-text { font-family: monospace; font-weight: bold; font-size: 24px; animation: floatUp 1s ease-out forwards; text-shadow: 0 0 10px currentColor; }
  @keyframes floatUp { 0% { transform: translate(var(--vx), var(--vy)) scale(0.5); opacity: 1; } 100% { transform: translate(var(--vx), calc(var(--vy) - 80px)) scale(1.5); opacity: 0; } }
  .vfx-comic { position: absolute; font-family: Impact, sans-serif; font-weight: 900; font-size: 80px; font-style: italic; letter-spacing: 2px; text-transform: uppercase; animation: kapow 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-shadow: 4px 4px 0px #fff, 0 0 20px currentColor; z-index: 100; white-space: nowrap; }
  @keyframes kapow { 0% { transform: translate(var(--vx), var(--vy)) scale(0) rotate(-15deg); opacity: 1; } 80% { transform: translate(var(--vx), var(--vy)) scale(1) rotate(5deg); opacity: 1; } 100% { transform: translate(var(--vx), calc(var(--vy) + 20px)) scale(0.8) rotate(0deg); opacity: 0; } }
  .vfx-paper { width: 80px; height: 100px; background: white; border: 2px solid #ccc; font-family: impact; color: red; font-size: 40px; text-align: center; line-height: 100px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); animation: dropDown 0.4s ease-in forwards; }
  @keyframes dropDown { 0% { transform: translate(var(--vx), -200px) rotate(45deg); } 100% { transform: translate(var(--vx), var(--vy)) rotate(0deg); } }

  /* DYNAMIC HUD WITH RESTORED SP BAR */
  .hud { position: absolute; top: 0; width: 100%; padding: 12px 15px; display: flex; justify-content: space-between; z-index: 20; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); align-items: flex-start;}
  .scoreboard { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 10px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
  .score-title { font-size: 9px; color: #fbbf24; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
  .score-numbers { font-size: 20px; font-weight: 900; font-family: monospace; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

  .player-info { width: 35vw; max-width: 250px; }
  .player-tag { font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 6px; text-shadow: 0 2px 4px black; letter-spacing: 1px; display: flex; align-items: baseline; gap: 6px;}
  .char-tag { font-size: 10px; color: #a1a1aa; font-weight: 800; letter-spacing: 0.5px; }
  
  .hp-bar-bg { width: 100%; height: 18px; background: rgba(0,0,0,0.8); border-radius: 9px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
  .hp-bar-fill { height: 100%; border-radius: 6px; transition: width 0.15s ease-out; box-shadow: inset 0 0 8px rgba(255,255,255,0.4); }
  
  .sp-bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.8); border-radius: 5px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.3); box-shadow: inset 0 0 5px rgba(0,0,0,0.8); overflow: hidden; }
  .sp-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #f59e0b, #fef08a); transition: width 0.1s linear; box-shadow: 0 0 10px #facc15; border-radius: 3px;}
  
  #stage-progress { display: none; position: absolute; top: 70px; left: 50%; transform: translateX(-50%); font-weight: 900; font-style: italic; color: #fbbf24; text-shadow: 0 2px 5px black; font-size: 22px; z-index: 20; letter-spacing: 2px; }

  /* K.O. SCREEN */
  #victory-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(5px); }
  #victory-ko { font-size: 100px; color: #ef4444; font-style: italic; font-weight: 900; text-shadow: 0 0 30px red, 5px 5px 0px #7f1d1d; margin-bottom: -10px; line-height: 1; }
  #winner-name { font-size: 30px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
  .rematch-btn { margin-top: 40px; padding: 15px 40px; font-size: 18px; border-radius: 30px; background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4); border: none; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }

  .particle { position: absolute; width: 8px; height: 8px; background: #fbbf24; border-radius: 50%; pointer-events: none; z-index: 50; box-shadow: 0 0 15px #ef4444, 0 0 25px #fbbf24; }

  /* SKELETAL FIGHTERS */
  .fighter { position: absolute; bottom: 25%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; z-index: 10;}
  .f-rig { position: relative; width: 40px; height: 80px; transition: transform 0.05s, width 0.3s; z-index: 10;}
  
  .hulk-mode { transform: scale(1.3) !important; transform-origin: bottom center; filter: drop-shadow(0 0 10px #22c55e); }
  .hulk-mode .f-limb { width: 14px; border-radius: 7px; }
  .hulk-mode .f-torso { width: 36px; margin-left: -18px; border-radius: 10px 10px 4px 4px; }
  .hulk-mode .f-arm-b { left: 0px; } .hulk-mode .f-arm-f { left: 22px; }

  .dhol-prop { position: absolute; font-size: 35px; top: 10px; left: -5px; display: none; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); z-index: 10; pointer-events: none;}
  .dhol-active .dhol-prop { display: block; animation: drumBounce 0.3s infinite alternate; }
  @keyframes drumBounce { 0% { transform: scale(1) rotate(-5deg); } 100% { transform: scale(1.1) rotate(5deg); } }

  .f-head { position: absolute; top: -20px; left: 50%; width: 22px; height: 26px; margin-left: -11px; border-radius: 40% 40% 50% 50%; z-index: 5; box-shadow: inset -2px -2px 6px rgba(0,0,0,0.6); transition: transform 0.1s;}
  .f-torso { position: absolute; top: 5px; left: 50%; width: 26px; height: 35px; margin-left: -13px; border-radius: 6px 6px 4px 4px; z-index: 4; box-shadow: inset 0 0 10px rgba(0,0,0,0.7); clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); transition: width 0.3s, margin-left 0.3s, transform 0.1s; }
  .f-limb { position: absolute; width: 8px; border-radius: 4px; transform-origin: top center; box-shadow: inset -1px -1px 4px rgba(0,0,0,0.6); transition: width 0.3s; }
  .f-limb::after { content: ''; position: absolute; top: calc(100% - 4px); left: 0; width: 100%; height: 100%; background: inherit; border-radius: inherit; transform-origin: top center; box-shadow: inherit; transform: rotate(var(--joint, 0deg)); transition: transform 0.05s; }
  
  .f-arm-b { top: 7px; left: 6px; height: 16px; z-index: 2; filter: brightness(0.5); transition: left 0.3s, top 0.3s;}
  .f-arm-f { top: 7px; left: 24px; height: 16px; z-index: 6; transition: left 0.3s, top 0.3s;}
  .f-leg-b { top: 35px; left: 10px; height: 20px; z-index: 1; filter: brightness(0.5); }
  .f-leg-f { top: 35px; left: 22px; height: 20px; z-index: 3; }

  .hurt .f-head, .hurt .f-torso, .hurt .f-limb { filter: brightness(2) drop-shadow(0 0 10px red) !important; background: #fff !important; }
  .hurt .f-head { transform: rotate(-20deg) translate(-5px, -5px); }
  .blocking .f-arm-f { transform: rotate(-140deg) translate(5px, -5px) !important; }
  .blocking .f-arm-f::after { transform: rotate(90deg) !important; }
  .blocking .f-arm-b { transform: rotate(140deg) !important; }
  .blocking .f-torso { transform: rotate(-10deg); }
  .block-aura { box-shadow: 0 0 15px rgba(255,255,255,0.8), inset 0 0 10px rgba(255,255,255,0.8) !important; border: 2px solid white; }

  .special-label { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); color: #ef4444; font-weight: 900; font-size: 16px; opacity: 0; transition: 0.1s; text-shadow: 0 4px 10px black; z-index: 20; width: 200px; text-align: center; pointer-events: none;}
  .special-label.show { opacity: 1; top: -80px; }

  /* OVERLAY CONTROLS */
  #pc-controls { position: absolute; bottom: 5px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; z-index: 50; pointer-events: none; font-weight: bold; text-shadow: 0 2px 4px black;}
  #mobile-controls { position: absolute; bottom: 15px; left: 0; width: 100%; height: 140px; display: none; justify-content: space-between; padding: 0 20px; z-index: 50; pointer-events: none; }
  @media (max-width: 768px) { #pc-controls { display: none; } }
  .d-pad, .action-pad { pointer-events: auto; display: grid; gap: 8px; grid-template-columns: 55px 55px 55px; grid-template-rows: 55px 55px; }
  #btn-up { grid-column: 2; grid-row: 1; } #btn-left { grid-column: 1; grid-row: 2; } #btn-right { grid-column: 3; grid-row: 2; }
  #btn-sp { grid-column: 1; grid-row: 1; } #btn-block { grid-column: 2; grid-row: 1; }
  #btn-punch { grid-column: 1; grid-row: 2; } #btn-kick { grid-column: 2; grid-row: 2; }
  .touch-btn { background: rgba(15, 23, 42, 0.6); border: 2px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; font-weight: 900; font-size: 20px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
  .touch-btn.pressed { background: rgba(255,255,255,0.4); transform: scale(0.9); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
</style>
</head>
<body>

<div id="app">
  <div class="version-badge">v1.1.0 (Relay Fallback & Local Co-Op)</div>

  <!-- SELECT SCREEN -->
  <div id="select-screen" class="screen active">
    <div id="lobby-ui">
      <div class="id-box" id="host-panel">
        <div>
          <div style="font-size:11px; color:#a5b4fc; font-weight:900; text-transform:uppercase;">Your Session ID:</div>
          <div class="my-id" id="my-peer-id">Connecting...</div>
        </div>
        <div style="text-align:right;">
          <label style="font-size:10px; color:#aaa; font-weight:bold; text-transform:uppercase;">Map:</label><br>
          <select id="map-select" style="padding:8px; font-size:12px; margin-bottom:6px;">
            <option value="alley">Cyber Alley</option>
            <option value="dojo">Sunset Dojo</option>
            <option value="mamak">Mamak Street</option>
          </select><br>
          <label style="font-size:10px; color:#aaa; font-weight:bold; text-transform:uppercase;">Mode:</label><br>
          <select id="mode-select" style="padding:8px; font-size:12px;">
            <option value="1v1">1v1 Online Fight</option>
            <option value="parkour">Parkour Race (Online)</option>
            <option value="local">Local 1v1 (Shared Keyboard)</option>
          </select>
        </div>
      </div>

      <div class="lobby-row" id="nickname-row">
        <div class="input-group" style="flex:2;">
          <label>1. Your Nickname (Required)</label>
          <input type="text" id="player-name" placeholder="e.g. Parv" maxlength="12">
        </div>
      </div>

      <div class="lobby-row" id="join-row" style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <div class="input-group" style="flex:2;">
          <label>2. Join a Friend (Leave blank to host)</label>
          <input type="text" id="join-id" placeholder="Paste 5-Letter ID" style="text-transform: uppercase;" maxlength="5">
        </div>
        <button onclick="connectToFriend()" style="flex:1; margin-top:22px; background: linear-gradient(135deg, #10b981, #059669);">Join Game</button>
      </div>
      <div id="connection-status"></div>
    </div>
    
    <div class="header">
      <h2>Choose Fighter</h2>
      <button id="ai-btn" onclick="pickAI()" style="width:auto; padding:10px 16px; background:rgba(255,255,255,0.1); box-shadow:none;">Solo vs AI</button>
      <button id="start-local-btn" onclick="startLocalMatch()" style="display:none; width:auto; padding:10px 16px; background:linear-gradient(135deg, #4f46e5, #6366f1); box-shadow:none;">Start Local Match</button>
    </div>
    <div class="char-grid locked" id="char-list" onclick="checkNameLock()"></div>
  </div>

  <!-- ARENA SCREEN -->
  <div id="arena-screen" class="screen">
    
    <div id="victory-screen">
      <div id="victory-ko">K.O.</div>
      <div id="winner-name">PLAYER WINS</div>
      <button class="rematch-btn" onclick="handleRematch()">Return to Lobby</button>
    </div>

    <div id="game-container" class="map-alley">
      <div id="arena">
        <div id="scroll-world">
            <div class="floor" id="arena-floor"></div>
            <div id="pits-container"></div>

<script>
const CHARS = [
  { id:'karthik', name:'Karthik', power:'67 Burst', skin:'#c79a7b', suit:'#1e1b4b', acc:'#4f46e5', icon: '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>' },
  { id:'andi', name:'Andi', power:'Hulk Out', skin:'#22c55e', suit:'#4c1d95', acc:'#22c55e', icon: '<path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 14a4 4 0 110-8 4 4 0 010 8z"/>' },
  { id:'jz', name:'JZ', power:'Rhythm Dash', skin:'#fbcfe8', suit:'#111827', acc:'#ec4899', icon: '<path stroke="#fff" stroke-width="2" stroke-linecap="round" d="M12 3v18m-4-14v10m8-10v10m-12-6v2m16-2v2"/>' },
  { id:'dexter', name:'Dexter', power:'Acid Spit', skin:'#e2b999', suit:'#3b0764', acc:'#a855f7', icon: '<path d="M12 2c0 0-7 7-7 11a7 7 0 0014 0c0-4-7-11-7-11z"/>' },
  { id:'yiliang', name:'Yi Liang', power:'Smoke Vanish', skin:'#f1f5f9', suit:'#475569', acc:'#94a3b8', icon: '<path d="M19 14.5a3.5 3.5 0 00-6.5-1.7A4.5 4.5 0 005.5 15c0 2 1.6 3.5 3.5 3.5h10a3.5 3.5 0 000-7z"/>' },
  { id:'sherman', name:'Sherman', power:'Beer Volley', skin:'#fcd34d', suit:'#78350f', acc:'#f59e0b', icon: '<path d="M7 2h10v3l-3 4v11H10V9L7 5V2z"/>' },
  { id:'parv', name:'Parv', power:'Dhol Beat', skin:'#d2a881', suit:'#ea580c', acc:'#facc15', icon: '<path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 16a6 6 0 110-12 6 6 0 010 12z"/>' },
  { id:'hari', name:'Hari', power:'Sleepwalk', skin:'#93c5fd', suit:'#1e3a8a', acc:'#60a5fa', icon: '<path d="M12 3a9 9 0 109 9c-1.6 0-3-1.4-3-3s1.4-3 3-3a9 9 0 00-9-3z"/>' },
  { id:'jerell', name:'Jerell', power:'A+ Paper', skin:'#ffffff', suit:'#000000', acc:'#e2e8f0', icon: '<path d="M12 15.5C8.5 15.5 5 12 5 12s3.5-3.5 7-3.5 7 3.5 7 3.5-3.5 3.5-7 3.5zm0-5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/>' },
  { id:'sham', name:'Sham', power:'Deadeye', skin:'#e5e5e5', suit:'#78350f', acc:'#dc2626', icon: '<path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16zm-1-11v2H9v2h2v2h2v-2h2v-2h-2V9h-2z"/>' }
];

const MAPS = {
  alley: { floor: '#0c0a20', grid: '#4f46e5' },
  dojo:  { floor: '#451a03', grid: '#fcd34d' },
  mamak: { floor: '#262626', grid: '#facc15' }
};

const STAGES = [
  { w: 2000, pits: [[500, 150], [1000, 150], [1500, 180]] }, 
  { w: 2500, pits: [[400, 150], [800, 150], [1300, 180], [1900, 200]] }, 
  { w: 3000, pits: [[600, 220], [1200, 150], [1800, 180], [2400, 200]] }, 
  { w: 3500, pits: [[500, 150], [1000, 220], [1600, 250], [2300, 150], [2900, 200]] }, 
  { w: 4000, pits: [[700, 250], [1400, 250], [2100, 280], [2800, 250], [3400, 200]] }  
];

// Added RELAY TURN servers for heavy firewall penetration
const peerConfig = { 
    config: { 
        'iceServers': [ 
            { urls: 'stun:stun.l.google.com:19302' }, 
            { urls: 'stun:stun1.l.google.com:19302' },
            // Public relay fallback (can be slow but pierces NAT)
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
        ] 
    } 
};

let peer, conn, myPeerId, isHost = true, onlineMode = false;
let myName = "", oppName = "Opponent";
let p1Score = 0, p2Score = 0; 
let p1Sel=null, p2Sel=null, f1, f2; 
let keys1 = {}, keys2 = {}, keys = {}; 
let activeMode = '1v1', activeMap = 'alley';
let soloParkour = false;
let isLocalMultiplayer = false;
let hitStopFrames = 0;
let isGameOver = false;
let connTimeout; 

let currentStage = 0;
let cameraX = 0;

function checkMobileUI() { if ('ontouchstart' in window || navigator.maxTouchPoints > 0) document.getElementById('mobile-controls').style.display = 'flex'; }

document.getElementById('player-name').addEventListener('input', (e) => {
  if(e.target.value.trim().length > 0) document.getElementById('char-list').classList.remove('locked');
  else document.getElementById('char-list').classList.add('locked');
});

// UI TOGGLES FOR MODES
document.getElementById('mode-select').addEventListener('change', (e) => {
    const btn = document.getElementById('ai-btn');
    const localBtn = document.getElementById('start-local-btn');
    const joinRow = document.getElementById('join-row');
    const idRow = document.getElementById('host-panel');

    if(e.target.value === 'local') {
        btn.style.display = 'none';
        joinRow.style.display = 'none';
        idRow.style.display = 'none';
        localBtn.style.display = 'block';
        document.getElementById('char-list').classList.remove('locked'); // Unlocked immediately for local
    } else {
        btn.style.display = 'block';
        joinRow.style.display = 'flex';
        idRow.style.display = 'flex';
        localBtn.style.display = 'none';
        document.getElementById('char-list').classList.add('locked');
        if(e.target.value === 'parkour') btn.innerText = "Parkour Solo";
        else btn.innerText = "Solo vs AI";
    }
});

function checkNameLock() { if(document.getElementById('char-list').classList.contains('locked')) alert("Please type your Nickname first!"); }

const generateIDStr = () => {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let res = '';
    for(let i=0; i<5; i++) res += chars.charAt(Math.floor(Math.random() * chars.length)); return res;
};

window.onload = () => {
  checkMobileUI(); renderChars();
  myPeerId = generateIDStr(); peer = new Peer(myPeerId, peerConfig);
  peer.on('open', id => { document.getElementById('my-peer-id').innerText = id; });
  peer.on('connection', c => { 
    if(conn && conn.open) conn.close(); 
    conn = c; isHost = true; onlineMode = true; isLocalMultiplayer = false;
    p1Score = 0; p2Score = 0; updateScoreboard(); 
    setupDataListeners(); showStatus("Opponent Connected!", "success"); 
  });
  peer.on('error', err => { if(err.type === 'unavailable-id') { myPeerId = generateIDStr(); peer = new Peer(myPeerId, peerConfig); } else { document.getElementById('my-peer-id').innerText = "Failed. Refresh."; } });
};

function showStatus(text, type) {
  const el = document.getElementById('connection-status');
  el.style.display = 'block'; el.innerText = text; el.style.color = type === "error" ? "#ef4444" : "#4ade80";
}

function checkName() {
  const n = document.getElementById('player-name').value.trim();
  if(!n) { alert("Please type your Nickname in Step 1!"); return false; }
  myName = n; return true;
}

function connectToFriend() {
  if(!checkName()) return;
  const friendId = document.getElementById('join-id').value.toUpperCase().trim();
  if(!friendId) { showStatus("Paste an ID to join.", "error"); return; }
  if(peer) peer.destroy(); peer = new Peer(peerConfig); 
  showStatus("Initiating Handshake...", "success");
  peer.on('open', () => {
    showStatus("Routing via Relay...", "success");
    conn = peer.connect(friendId);
    isHost = false; onlineMode = true; isLocalMultiplayer = false; p1Score = 0; p2Score = 0; updateScoreboard();
    
    // Increased timeout for Relay fallback
    connTimeout = setTimeout(() => { if(conn && !conn.open) { showStatus("Firewall blocked connection. Try playing Local.", "error"); peer.destroy(); } }, 15000);
    setupDataListeners();
  });
  peer.on('error', err => showStatus("Session not found. Try again.", "error"));
}

function setupDataListeners() {
  conn.on('open', () => {
    clearTimeout(connTimeout); conn.send({type: 'hello', name: myName});
    document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  });

  conn.on('data', data => {
    if (data.type === 'hello') {
      oppName = data.name; showStatus(`Connected to: ${oppName}!`, "success");
      if(isHost) { myName = document.getElementById('player-name').value.trim() || "Host"; conn.send({type: 'hello', name: myName}); }
    }
    if (data.type === 'ready') { p2Sel = CHARS.find(c => c.id === data.p2); if(p1Sel) sendStart(); }
    if (data.type === 'sync' && !isHost) {
      if(f1) f1.hp = data.hp1; if(f2) f2.hp = data.hp2; 
      if(f1 && Math.abs(f1.x - data.x1) > 25) f1.x = data.x1;
      if(f2 && Math.abs(f2.x - data.x2) > 25) f2.x = data.x2;
      p1Score = data.s1; p2Score = data.s2; updateScoreboard();
      if(activeMode === 'parkour') { currentStage = data.stg; document.getElementById('stage-progress').innerText = `STAGE ${currentStage+1}/5`; buildPits(); }
    }
    if (data.type === 'keys') { if (isHost) keys2 = data.keys; else keys1 = data.keys; }
    if (data.type === 'start') { 
      p1Sel = CHARS.find(c => c.id === data.p1); p2Sel = CHARS.find(c => c.id === data.p2); 
      activeMap = data.map; activeMode = data.mode; startFight(); 
    }
    if (data.type === 'gameover') { triggerKO(data.winner, false); p1Score = data.s1; p2Score = data.s2; updateScoreboard(); }
    if (data.type === 'rematch') { resetToLobby(); }
    if (data.type === 'stage_win' && !isHost) { triggerStageWin(data.winner, false); }
  });
}

function updateScoreboard() {
  document.getElementById('hud-score').style.display = 'flex';
  document.getElementById('score-display').innerText = `${p1Score} - ${p2Score}`;
}

function renderChars(){
  const grid = document.getElementById('char-list'); grid.innerHTML = '';
  CHARS.forEach(c=>{
    const div = document.createElement('div'); div.className = 'char-card';
    div.innerHTML = `<div class="char-icon" style="background-color:${c.suit}"><svg viewBox="0 0 24 24">${c.icon}</svg></div><span class="char-name">${c.name}</span><span class="char-power" style="color:${c.acc}">${c.power}</span>`;
    
    div.onclick = () => { 
        if(document.getElementById('mode-select').value === 'local') {
            selectCharLocal(c, div);
        } else {
            if(!grid.classList.contains('locked')) selectChar(c, div); 
        }
    }
    grid.appendChild(div);
  });
}

function selectChar(c, el){
  if(onlineMode) {
    if(isHost) { p1Sel = c; document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p1')); el.classList.add('selected-p1'); if(p2Sel) sendStart(); } 
    else { p2Sel = c; document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p2')); el.classList.add('selected-p2'); conn.send({type:'ready', p2: p2Sel.id}); }
  } else {
    if(!checkName()) return;
    p1Sel = c; 
    if(!soloParkour) {
        const others = CHARS.filter(char => char.id !== p1Sel.id);
        p2Sel = others[Math.floor(Math.random() * others.length)]; oppName = "AI Bot";
    } else { p2Sel = CHARS[0]; oppName = "None"; }
    startFight();
  }
}

// LOCAL MULTIPLAYER LOGIC
function selectCharLocal(c, el) {
    if(!p1Sel) {
        p1Sel = c;
        el.classList.add('selected-p1');
        document.getElementById('pc-controls').innerText = "Player 1 Selected. Player 2, pick your fighter.";
    } else if(!p2Sel) {
        p2Sel = c;
        el.classList.add('selected-p2');
        document.getElementById('pc-controls').innerText = "[P1: W A S D / P2: Arrows] - Click Start Local Match";
    } else {
        // Reset selection
        p1Sel = c; p2Sel = null;
        document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected-p1', 'selected-p2'));
        el.classList.add('selected-p1');
    }
}

function startLocalMatch() {
    if(!p1Sel || !p2Sel) { alert("Both players must select a fighter!"); return; }
    isLocalMultiplayer = true;
    onlineMode = false;
    isHost = true;
    aiMode = false;
    soloParkour = false;
    myName = "Player 1";
    oppName = "Player 2";
    p1Score = 0; p2Score = 0; updateScoreboard();
    
    document.getElementById('pc-controls').innerHTML = "<b>P1:</b> [W A S D] Move | [V] Block | [B] Punch | [N] Kick | [M] Special<br><b>P2:</b> [ARROWS] Move | [Num1] Block | [Num2] Punch | [Num3] Kick | [Num0] Special";
    
    activeMap = document.getElementById('map-select').value; 
    activeMode = '1v1'; // Force 1v1 for local
    startFight();
}


function pickAI() {
  if(!checkName()) return;
  activeMode = document.getElementById('mode-select').value;
  if(activeMode === 'parkour') { soloParkour = true; aiMode = false; } else { soloParkour = false; aiMode = true; }
  onlineMode = false; isHost = true; isLocalMultiplayer = false; p1Score = 0; p2Score = 0; updateScoreboard();
  document.getElementById('char-list').classList.remove('locked');
  document.querySelectorAll('.char-card').forEach(c => c.classList.add('unlocked'));
  document.getElementById('lobby-ui').style.display = 'none';
}

function sendStart() { 
  activeMap = document.getElementById('map-select').value; activeMode = document.getElementById('mode-select').value;
  soloParkour = false; 
  conn.send({type:'start', p1: p1Sel.id, p2: p2Sel.id, map: activeMap, mode: activeMode}); 
  startFight(); 
}

function applySkin(fObj, sel) {
  const rig = document.getElementById(fObj.id);
  rig.querySelector('.f-head').style.background = sel.skin; rig.querySelector('.f-torso').style.background = sel.suit;
  rig.querySelectorAll('.f-limb').forEach(l => l.style.background = sel.acc);
}

function applyMap() {
  const m = MAPS[activeMap];
  const container = document.getElementById('game-container');
  container.className = `map-${activeMap}`; 
  container.style.background = ''; 
  
  const floor = document.getElementById('arena-floor');
  floor.style.backgroundColor = m.floor; floor.style.borderTopColor = m.grid;
  floor.style.backgroundImage = `linear-gradient(90deg, ${m.grid}40 1px, transparent 1px), linear-gradient(${m.grid}40 1px, transparent 1px)`;
}

function buildPits() {
  const container = document.getElementById('pits-container');
  if(!container) return;
  container.innerHTML = '';
  if(activeMode !== 'parkour') return;
  const stageData = STAGES[currentStage];
  
  stageData.pits.forEach(p => {
    const pit = document.createElement('div'); pit.className = 'pit';
    pit.style.left = p[0] + 'px'; pit.style.width = p[1] + 'px';
    container.appendChild(pit);
  });
  
  const finish = document.createElement('div'); finish.className = 'finish-line';
  finish.style.left = (stageData.w - 50) + 'px';
  container.appendChild(finish);
}

function resetToLobby() {
  isGameOver = false;
  if(f1 && f1.specialInt) clearInterval(f1.specialInt);
  if(f2 && f2.specialInt) clearInterval(f2.specialInt);

  document.getElementById('victory-screen').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('select-screen').classList.add('active');
  p1Sel = null; p2Sel = null; keys = {}; keys1 = {}; keys2 = {}; currentStage = 0;
  document.querySelectorAll('.char-card').forEach(c => { c.classList.remove('selected-p1', 'selected-p2'); });
  document.getElementById('vfx-layer').innerHTML = ''; 
  document.getElementById('p1').querySelector('.f-rig').classList.remove('hulk-mode');
  document.getElementById('p2').querySelector('.f-rig').classList.remove('hulk-mode');
  document.getElementById('p1').querySelector('.f-torso').classList.remove('dhol-active');
  document.getElementById('p2').querySelector('.f-torso').classList.remove('dhol-active');
  document.getElementById('p2').style.display = 'flex'; 
}

function handleRematch() {
  resetToLobby();
  if(onlineMode && conn && conn.open) conn.send({type: 'rematch'});
}

let lastTime = 0;
const fpsInterval = 1000 / 60; 

function startFight(){
  isGameOver = false; currentStage = 0; cameraX = 0;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('arena-screen').classList.add('active');
  
  applyMap(); updateScoreboard(); buildPits();
  
  document.getElementById('p1-tag').innerHTML = `${isHost ? myName : oppName} <span class="char-tag">(${p1Sel.name})</span>`;
  document.getElementById('p2-tag').innerHTML = `<span class="char-tag">(${p2Sel.name})</span> ${isHost ? oppName : myName}`;
  document.getElementById('hp-1').style.background = `linear-gradient(90deg, ${p1Sel.suit}, ${p1Sel.skin})`;
  document.getElementById('hp-2').style.background = `linear-gradient(90deg, ${p2Sel.suit}, ${p2Sel.skin})`;

  if(activeMode === 'parkour') {
      document.getElementById('stage-progress').style.display = 'block';
      document.getElementById('stage-progress').innerText = `STAGE 1/5`;
  } else { document.getElementById('stage-progress').style.display = 'none'; }

  const aW = activeMode === 'parkour' ? STAGES[currentStage].w : document.getElementById('game-container').offsetWidth;
  f1 = { id:'p1', x:50, y:0, vx:0, vy:0, hp:100, sp:0, dir:1, action:'idle', hit:false, jump:false, w:40, maxW: aW, isBlocking: false, buff: 0 };
  f2 = { id:'p2', x: activeMode === 'parkour' ? 100 : document.getElementById('game-container').offsetWidth - 90, y:0, vx:0, vy:0, hp:100, sp:0, dir:-1, action:'idle', hit:false, jump:false, w:40, maxW: aW, isBlocking: false, buff: 0 };
  
  applySkin(f1, p1Sel); applySkin(f2, p2Sel);

  if(soloParkour && activeMode === 'parkour') {
      f2.x = -2000; f2.hp = 0; 
      document.getElementById('p2').style.display = 'none';
      document.getElementById('p2-tag').style.display = 'none';
  } else {
      document.getElementById('p2').style.display = 'flex';
      document.getElementById('p2-tag').style.display = 'flex';
  }

  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function triggerKO(winnerText, sendSignal = true) {
  if(isGameOver) return;
  isGameOver = true;
  document.getElementById('victory-ko').innerText = "K.O.";
  
  if(isHost || !onlineMode) {
      let p1N = isHost ? myName : oppName; let p2N = isHost ? oppName : myName;
      if (winnerText === `${p1N} WINS!`) p1Score++;
      if (winnerText === `${p2N} WINS!`) p2Score++;
      updateScoreboard();
  }

  document.getElementById('winner-name').innerText = winnerText;
  document.getElementById('victory-screen').style.display = 'flex';
  
  if(sendSignal && onlineMode && conn && conn.open) {
    try { conn.send({type: 'gameover', winner: winnerText, s1: p1Score, s2: p2Score}); } catch(e){}
  }
}

function triggerStageWin(winnerText, sendSignal = true) {
    if(isGameOver) return;
    isGameOver = true; 
    document.getElementById('victory-ko').innerText = "FINISH!";
    document.getElementById('winner-name').innerText = winnerText;
    document.getElementById('victory-screen').style.display = 'flex';
    
    if(isHost || !onlineMode) {
        let p1N = isHost ? myName : oppName; let p2N = isHost ? oppName : myName;
        if (winnerText === `${p1N} TAKES THE STAGE!`) p1Score++;
        if (winnerText === `${p2N} TAKES THE STAGE!`) p2Score++;
        updateScoreboard();
    }

    if(sendSignal && onlineMode && conn && conn.open) {
        try { conn.send({type: 'stage_win', winner: winnerText}); } catch(e){}
    }

    setTimeout(() => {
        currentStage++;
        if(currentStage >= 5 || p1Score === 3 || p2Score === 3) {
            let overall = p1Score > p2Score ? (isHost?myName:oppName) : (isHost?oppName:myName);
            isGameOver = false; 
            triggerKO(`${overall} WINS THE RACE!`, true);
        } else {
            isGameOver = false;
            document.getElementById('victory-screen').style.display = 'none';
            document.getElementById('stage-progress').innerText = `STAGE ${currentStage+1}/5`;
            f1.maxW = STAGES[currentStage].w; f2.maxW = STAGES[currentStage].w;
            f1.x = 50; f1.y = 0; f1.hp = 100; f1.sp = 0; f1.vy = 0; f1.jump = false;
            f2.x = 100; f2.y = 0; f2.hp = 100; f2.sp = 0; f2.vy = 0; f2.jump = false;
            if(soloParkour) { f2.hp = 0; f2.x = -2000; }
            cameraX = 0; buildPits();
        }
    }, 2000);
}

function gameLoop(timestamp){
  if(isGameOver && activeMode !== 'parkour') return; 
  requestAnimationFrame(gameLoop); 
  
  if(!lastTime) lastTime = timestamp;
  const elapsed = timestamp - lastTime;
  
  if(elapsed > fpsInterval) {
      lastTime = timestamp - (elapsed % fpsInterval);

      if(!isGameOver) {
          if(hitStopFrames > 0) { hitStopFrames--; return; } 

          if(isLocalMultiplayer) {
              // Map local shared keyboard
              keys1 = { 'w':keys['w'], 'a':keys['a'], 's':keys['s'], 'd':keys['d'], 'b':keys['v'], 'j':keys['b'], 'k':keys['n'], 'l':keys['m'] };
              keys2 = { 'w':keys['arrowup'], 'a':keys['arrowleft'], 's':keys['arrowdown'], 'd':keys['arrowright'], 'b':keys['1'], 'j':keys['2'], 'k':keys['3'], 'l':keys['0'] };
          } 
          else if(onlineMode && conn && conn.open) {
            if(isHost) { 
              keys1 = keys; 
              try { conn.send({type: 'sync', hp1: f1.hp, hp2: f2.hp, x1: f1.x, x2: f2.x, s1: p1Score, s2: p2Score, stg: currentStage}); } catch(e){}
            } else { keys2 = keys; }
            try { conn.send({type: 'keys', keys: keys}); } catch(e){}
          } else { keys1 = keys; }
          
          updateFighter(f1, f2, keys1);
          updateFighter(f2, f1, keys2);
          if(aiMode) doAI();

          if(activeMode === 'parkour') {
              const sw = document.getElementById('game-container').offsetWidth;
              const leaderX = soloParkour ? f1.x : Math.max(f1.x, f2.x);
              cameraX = Math.max(0, leaderX - sw/2);
              document.getElementById('scroll-world').style.transform = `translateX(${-cameraX}px)`;
              
              [f1, f2].forEach(f => {
                  if(f.hp > 0 && f.x < cameraX - 50) { f.hp -= 2; f.x = cameraX - 40; } 
              });

              if(isHost || !onlineMode) {
                  if(f1.hp <= 0 && (!soloParkour && f2.hp <= 0)) {
                      triggerStageWin(`NOBODY SURVIVED`); 
                  }
                  else if(f1.x >= STAGES[currentStage].w - 50) triggerStageWin(`${isHost ? myName : oppName} TAKES THE STAGE!`);
                  else if (!soloParkour && f2.x >= STAGES[currentStage].w - 50) triggerStageWin(`${isHost ? oppName : myName} TAKES THE STAGE!`);
              }
          }
      }
      
      draw();

      if((isHost || !onlineMode) && !isGameOver && activeMode === '1v1') {
          if(f1.hp <= 0 || f2.hp <= 0) { 
            let p1Name = isHost ? myName : oppName; let p2Name = isHost ? oppName : myName;
            const winner = f1.hp <= 0 ? p2Name : p1Name;
            triggerKO(`${winner} WINS!`); 
          }
      }
  }
}

function updateFighter(f, opp, k){
  let currentArenaWidth = activeMode === 'parkour' ? STAGES[currentStage].w : document.getElementById('game-container').offsetWidth;

  if(f.action !== 'special_active' && f.action !== 'dhol_beat' && f.action !== 'karthik_meme') {
      f.action = 'idle';
      if(k['b']) { f.isBlocking = true; f.vx *= 0.5; } 
      else {
        f.isBlocking = false;
        let speed = 6;
        if(activeMode === 'parkour' && (f.id==='p1'?p1Sel:p2Sel).id === 'jz') speed = 8; 
        if(k['a']) { f.vx = -speed; f.action = 'walk'; } else if(k['d']) { f.vx = speed; f.action = 'walk'; } else f.vx *= 0.8;
      }
  }

  f.x += f.vx; f.y += f.vy; 
  f.vy += (activeMode === 'parkour' && (f.id==='p1'?p1Sel:p2Sel).id === 'hari') ? 0.6 : 0.9;

  let inPit = false;
  if (activeMode === 'parkour' && STAGES[currentStage]) {
      const cx = f.x + f.w/2;
      for(let p of STAGES[currentStage].pits) {
          if(cx > p[0] && cx < p[0]+p[1]) { inPit = true; break; }
      }
  }

  if(f.y >= 0 && !inPit){ f.y=0; f.vy=0; f.jump=false; }
  if(inPit && f.y >= 0) { f.vy += 0.9; } 

  if(k['w'] && f.y === 0 && !f.isBlocking && !inPit && !f.jump && f.action !== 'special_active' && f.action !== 'karthik_meme') { 
      f.vy = -16; 
      f.jump = true;
      if(activeMode === 'parkour' && (f.id==='p1'?p1Sel:p2Sel).id === 'andi' && f.buff > 0) f.vy = -22; 
      f.action = 'jump'; 
  }

  if(f.y > 600) { 
      f.hp -= 20; 
      f.x = Math.max(0, f.x - 150); 
      f.y = -200; f.vy = -10; 
      triggerShake('heavy'); 
  }

  if(f.x < 0) f.x=0; if(f.x > currentArenaWidth - f.w) f.x = currentArenaWidth - f.w;
  
  if(opp && opp.hp > 0 && f.action !== 'special_active' && f.action !== 'dhol_beat' && f.action !== 'karthik_meme') f.dir = (f.x < opp.x) ? 1 : -1;
  
  if(!f.isBlocking && f.action !== 'special_active' && f.action !== 'dhol_beat' && f.action !== 'karthik_meme' && activeMode === '1v1') {
    if(k['j']) { attack(f, opp, 6, 45); f.action = 'punch'; }
    else if(k['k']) { attack(f, opp, 9, 55); f.action = 'kick'; }
    else if(k['l'] && f.sp >= 100) doSpecial(f, opp);
  } else if (activeMode === 'parkour' && k['l'] && f.sp >= 100 && !f.isBlocking && f.action !== 'special_active' && f.action !== 'karthik_meme') {
    doSpecial(f, opp); 
  }
  
  f.sp = Math.min(100, f.sp + 0.15);
  if(f.buff > 0) f.buff--;
}

function triggerShake(type = 'normal') {
  const arena = document.getElementById('game-container');
  arena.classList.remove('shake-anim', 'shake-anim-heavy'); void arena.offsetWidth; 
  arena.classList.add(type === 'heavy' ? 'shake-anim-heavy' : 'shake-anim');
}

function spawnParticles(x, y, dir, color = '#fbbf24') {
  for(let i=0; i<6; i++) {
    const p = document.createElement('div'); p.className = 'particle'; p.style.background = color; p.style.boxShadow = `0 0 15px ${color}`;
    document.getElementById('scroll-world').appendChild(p);
    let vx = dir * (Math.random() * 8 + 4); let vy = (Math.random() - 1) * 12; let life = 20;
    let cx = x + 20; let cy = y - 40;
    const anim = () => {
      if(life <= 0 || isGameOver) { p.remove(); return; }
      cx += vx; cy += vy; vy += 1; p.style.transform = `translate(${cx}px, ${cy}px)`; p.style.opacity = life / 20;
      life--; requestAnimationFrame(anim);
    }; requestAnimationFrame(anim);
  }
}

function createVFX(type, x, y, color, text = '', dir = 1, destX = 0) {
  const layer = document.getElementById('vfx-layer');
  if(!layer) return;
  const vfx = document.createElement('div');
  vfx.classList.add('vfx-base', `vfx-${type}`);
  
  let screenX = activeMode === 'parkour' ? x - cameraX : x;

  vfx.style.setProperty('--vx', `${screenX + 20}px`);
  vfx.style.setProperty('--vy', `${y - 40}px`);

  if(type === 'ring') {
    vfx.style.border = `5px solid ${color}`; vfx.style.width = '100px'; vfx.style.height = '100px';
    vfx.style.setProperty('--vx', `${screenX - 30}px`); vfx.style.setProperty('--vy', `${y - 90}px`);
  } else if (type === 'acid') {
    vfx.style.setProperty('--vx', `${screenX - 70}px`);
  } else if (type === 'text') {
    vfx.style.color = color; vfx.innerText = text;
  } else if (type === 'comic') {
    let sw = document.getElementById('game-container').offsetWidth;
    let safeX = Math.max(80, Math.min(screenX + 20, sw - 200)); 
    vfx.style.setProperty('--vx', `${safeX}px`);
    vfx.style.color = color; vfx.innerText = text;
  } else if (type === 'projectile') {
    if(text) {
        vfx.innerText = text; vfx.style.background = 'transparent'; vfx.style.boxShadow = 'none'; vfx.style.fontSize = '40px';
        vfx.style.display = 'flex'; vfx.style.alignItems = 'center'; vfx.style.justifyContent = 'center';
    } else {
        vfx.style.background = color; vfx.style.boxShadow = `0 0 20px ${color}`;
    }
    vfx.style.setProperty('--start-x', `${screenX + (dir*40)}px`); vfx.style.setProperty('--start-y', `${y - 40}px`);
    let destScreenX = activeMode === 'parkour' ? destX - cameraX : destX;
    vfx.style.setProperty('--end-x', `${destScreenX}px`); vfx.style.setProperty('--end-y', `${y - 20}px`);
  } else if (type === 'paper') {
    vfx.innerText = "A+";
    vfx.style.setProperty('--vx', `${screenX - 20}px`); vfx.style.setProperty('--vy', `${y - 50}px`);
  }

  layer.appendChild(vfx);
  setTimeout(() => { if(layer.contains(vfx)) vfx.remove(); }, type === 'projectile' ? 400 : 1500);
}

function applyDamage(opp, dmg, dir, isSpecial = false) {
    if(activeMode === 'parkour') return; 
    if(opp && opp.isBlocking) {
        opp.hp -= 10; 
        showLabel(opp.id, "BLOCKED!", "#a1a1aa");
    } else if (opp) {
        opp.hp -= dmg; 
        opp.vx = dir * (isSpecial ? 25 : 10);
        triggerShake(isSpecial ? 'heavy' : 'normal');
        showLabel(opp.id, `-${dmg} DMG!`, "#ef4444");
    }
}

function attack(f, opp, dmg, range){
  if(activeMode === 'parkour') return;
  if(f.hit) return; f.hit = true; setTimeout(()=>f.hit=false, 300);
  if(!opp || opp.hp <= 0) return;
  const dist = Math.abs((f.x + f.w/2) - (opp.x + opp.w/2));
  if(dist < range + f.w/2 + opp.w/2){
    triggerShake(); spawnParticles(opp.x, opp.y, f.dir); hitStopFrames = 4;
    if(opp.isBlocking) {
      opp.hp -= dmg * 0.5; showLabel(opp.id, "BLOCKED!", "#a1a1aa");
    } else {
      opp.hp -= dmg; opp.vx = f.dir * 10; showLabel(opp.id, `-${dmg} DMG!`, "#ef4444"); 
    }
  }
}

function doSpecial(f, opp){
  f.sp = 0; 
  const charId = (f.id === 'p1' ? p1Sel : p2Sel).id;
  
  if(f.specialInt) clearInterval(f.specialInt); 
  
  if (charId === 'karthik') { 
    showLabel(f.id, "WAIT FOR IT...", "#4f46e5");
    f.action = 'karthik_meme'; 
    let count = 0;
    f.specialInt = setInterval(() => {
        if(isGameOver || f.hp <= 0) { clearInterval(f.specialInt); return; }
        count++;
        f.x += f.dir * 15; 
        if((opp && Math.abs(f.x - opp.x) < 60 && activeMode === '1v1') || count > 25) {
            clearInterval(f.specialInt); f.action = 'idle'; hitStopFrames = 10;
            createVFX('comic', opp ? opp.x : f.x, f.y, '#4f46e5', 'SIX!');
            if(activeMode === '1v1' && opp) { if(!opp.isBlocking) { opp.hp -= 15; opp.vx = f.dir * 5; } else { opp.hp -= 5; } }
            triggerShake(); spawnParticles(opp ? opp.x : f.x, f.y, f.dir, '#4f46e5');
            setTimeout(() => {
                hitStopFrames = 15;
                createVFX('comic', opp ? opp.x : f.x, f.y - 30, '#ef4444', 'SEVENN!');
                if(activeMode === '1v1' && opp) { if(!opp.isBlocking) { opp.hp -= 25; opp.vx = f.dir * 30; } else { opp.hp -= 5; } }
                triggerShake('heavy'); spawnParticles(opp ? opp.x : f.x, f.y, f.dir, '#ef4444');
            }, 400);
        }
    }, 50);
  } 
  else if (charId === 'andi') { 
    showLabel(f.id, "HULK SMASH!", "#22c55e"); document.getElementById(f.id).querySelector('.f-rig').classList.add('hulk-mode');
    createVFX('ring', f.x, f.y, '#22c55e'); hitStopFrames = 10; f.buff = 300;
    if(activeMode === '1v1' && opp && Math.abs(f.x - opp.x) < 150) { applyDamage(opp, 40, f.dir, true); }
    spawnParticles(f.x, f.y, 1, '#22c55e'); spawnParticles(f.x, f.y, -1, '#22c55e');
  } 
  else if (charId === 'dexter') { 
    showLabel(f.id, "SPITBALL!", "#22c55e");
    let targetX = opp ? opp.x : f.x + (f.dir*200);
    createVFX('projectile', f.x, f.y, '#22c55e', '', f.dir, targetX);
    setTimeout(() => {
        createVFX('acid', targetX, f.y, '#22c55e');
        if(activeMode === '1v1' && opp) applyDamage(opp, 40, f.dir, true);
        spawnParticles(targetX, f.y, f.dir, '#22c55e');
    }, 400);
  }
  else if (charId === 'sherman') { 
    showLabel(f.id, "BO TAH BO LAMPAH!", "#f59e0b");
    f.action = 'special_active'; 
    let targetX = opp ? opp.x : f.x + (f.dir*150);
    createVFX('projectile', f.x, f.y, 'transparent', '🍺', f.dir, targetX);
    setTimeout(() => {
        f.action = 'idle';
        if(activeMode === '1v1' && opp) applyDamage(opp, 40, f.dir, true);
        createVFX('smoke', targetX, f.y, '#f59e0b');
    }, 400);
  }
  else if (charId === 'parv') { 
    showLabel(f.id, "DHOL BEAT!", "#ea580c");
    f.action = 'dhol_beat';
    let beat = 0;
    f.specialInt = setInterval(() => {
        if(isGameOver || f.hp <= 0) { clearInterval(f.specialInt); return; }
        createVFX('ring', f.x, f.y, '#facc15'); triggerShake();
        if(activeMode === 'parkour') f.x += f.dir * 40; 
        if(activeMode === '1v1' && opp) { if(!opp.isBlocking) { opp.hp -= (beat===2 ? 14 : 13); opp.vx = f.dir * 10; } else { opp.hp -= 3; } }
        if(++beat > 2) { clearInterval(f.specialInt); setTimeout(() => f.action = 'idle', 300); }
    }, 400);
  }
  else if (charId === 'hari') { 
    showLabel(f.id, "ZZZ...", "#60a5fa");
    let z = 0;
    f.specialInt = setInterval(() => {
        if(isGameOver || f.hp <= 0) { clearInterval(f.specialInt); return; }
        let targetX = opp ? opp.x : f.x + (f.dir*150);
        createVFX('projectile', f.x, f.y, 'transparent', 'Z', f.dir, targetX);
        setTimeout(() => { if(activeMode === '1v1' && opp) { if(!opp.isBlocking) { opp.hp -= (z===2 ? 14 : 13); opp.vx = f.dir * 5; triggerShake();} else { opp.hp-=3; } } }, 400);
        if(++z > 2) clearInterval(f.specialInt);
    }, 200);
  }
  else if (charId === 'jerell') { 
    showLabel(f.id, "CALCULATED.", "#e2e8f0"); createVFX('text', f.x, f.y, '#e2e8f0', 'E=MC^2');
    setTimeout(() => { 
        createVFX('paper', opp ? opp.x : f.x + (f.dir*100), f.y, '#fff'); 
        setTimeout(() => { if(activeMode === '1v1' && opp) applyDamage(opp, 40, f.dir, true); }, 400); 
    }, 200);
  }
  else if (charId === 'sham') { 
    showLabel(f.id, "DEADEYE", "#dc2626"); 
    let targetX = opp ? opp.x : f.x + (f.dir*200);
    createVFX('crosshair', targetX, f.y, '#dc2626');
    hitStopFrames = 25; 
    setTimeout(() => { createVFX('ring', targetX, f.y, '#dc2626'); if(activeMode==='1v1' && opp) applyDamage(opp, 40, f.dir, true); spawnParticles(targetX, f.y, f.dir, '#dc2626'); }, 400); 
  }
  else if (charId === 'jz') { 
    showLabel(f.id, "RHYTHM DASH!", "#ec4899"); let count = 0;
    f.specialInt = setInterval(() => {
      if(isGameOver || f.hp <= 0) { clearInterval(f.specialInt); return; }
      f.x += f.dir * 55; spawnParticles(f.x, f.y, f.dir * -1, '#ec4899'); triggerShake('heavy');
      createVFX('comic', f.x, f.y, '#ec4899', 'BAM!');
      if(activeMode === '1v1' && opp && Math.abs(f.x - opp.x) < 70) { if(!opp.isBlocking){ opp.hp -= (count===2 ? 14 : 13); opp.vx = f.dir * 10; } else { opp.hp-=3;} }
      if(++count > 2) clearInterval(f.specialInt);
    }, 180);
  } else if (charId === 'yiliang') { 
    showLabel(f.id, "SMOKE VANISH!", "#94a3b8"); createVFX('smoke', f.x, f.y, '#94a3b8');
    f.x = activeMode === 'parkour' ? f.x + (f.dir * 180) : (opp ? opp.x - (opp.dir * 60) : f.x + 100); 
    createVFX('smoke', f.x, f.y, '#94a3b8');
    setTimeout(() => { if(activeMode === '1v1' && opp) applyDamage(opp, 40, f.dir, true); }, 300);
  }
}

function showLabel(pid, txt, color){
  const l = document.getElementById(pid+'-label'); 
  if(!l) return;
  l.innerText = txt; l.style.color = color;
  l.classList.add('show'); setTimeout(()=>l.classList.remove('show'), 800);
}

function draw(){
  const t = Date.now() / 100;
  
  if(activeMode === 'parkour') {
      document.getElementById('scroll-world').style.transform = `translateX(${-cameraX}px)`;
  } else { document.getElementById('scroll-world').style.transform = `none`; }

  const updateF = (f, el) => {
    if(f.hp <= 0 && !isGameOver) { el.style.opacity = '0.3'; } else { el.style.opacity = '1'; } 
    
    let screenX = activeMode === 'parkour' ? f.x - cameraX : f.x;
    el.style.transform = `translate(${screenX}px, ${f.y}px)`; 
    
    let scale = (((f.id==='p1'?p1Sel:p2Sel).id === 'andi' && f.buff > 0) ? 1.4 : 1);
    el.querySelector('.f-rig').style.transform = `scaleX(${f.dir * scale}) scaleY(${scale})`;
    
    let aF = 20, aB = -10, lF = 10, lB = -10, j_aF = -40, j_aB = -30, j_lF = 20, j_lB = 10; 
    
    if(f.action === 'karthik_meme') {
       el.querySelector('.f-head').style.transform = `rotate(0deg) scaleX(${1.2 * f.dir})`; 
       el.querySelector('.f-torso').style.transform = `scaleX(${1.3 * f.dir})`;
       aF = 160 + Math.sin(t*15) * 40; aB = 160 + Math.sin(t*15 + Math.PI) * 40; 
       j_aF = 0; j_aB = 0; lF = 0; lB = 0;
    }
    else if(f.action === 'dhol_beat') {
       el.querySelector('.f-torso').classList.add('dhol-active');
       aF = 90 + Math.sin(t*20)*30; aB = 90 + Math.sin(t*20 + Math.PI)*30; j_aF = 0; j_aB = 0; lF = 0; lB = 0;
    }
    else if(f.action === 'special_active') {
       aF = Math.sin(t*5) * 180; aB = -Math.sin(t*5) * 180; j_aF = 0; j_aB = 0;
       lF = Math.sin(t*2) * 50; lB = -Math.sin(t*2) * 50;
    }
    else if(f.action === 'punch') { aF = -90; j_aF = 0; aB = 20; j_aB = -60; lF = -20; j_lF = 30; }
    else if(f.action === 'kick') { lF = -100; j_lF = 0; aF = 40; j_aF = -40; aB = -40; j_aB = -20; lB = 10; j_lB = 20; }
    else if(f.action === 'walk') {
      aF = Math.sin(t) * -40; j_aF = -20 + Math.sin(t) * -20; aB = Math.sin(t) * 40; j_aB = -20 - Math.sin(t) * -20;
      lF = Math.sin(t) * -50; j_lF = Math.max(0, Math.sin(t) * 40); lB = Math.sin(t) * 50; j_lB = Math.max(0, -Math.sin(t) * 40);
    } else { const bob = Math.sin(t*2) * 2; el.querySelector('.f-rig').style.transform += ` translateY(${bob}px)`; }
    
    if(f.action !== 'karthik_meme') {
       el.querySelector('.f-head').style.transform = ``; el.querySelector('.f-torso').style.transform = ``;
    }
    if(f.action !== 'dhol_beat') { el.querySelector('.f-torso').classList.remove('dhol-active'); }

    el.querySelector('.f-arm-f').style.transform = `rotate(${aF}deg)`; el.querySelector('.f-arm-b').style.transform = `rotate(${aB}deg)`;
    el.querySelector('.f-leg-f').style.transform = `rotate(${lF}deg)`; el.querySelector('.f-leg-b').style.transform = `rotate(${lB}deg)`;
    el.querySelector('.f-arm-f').style.setProperty('--joint', `${j_aF}deg`); el.querySelector('.f-arm-b').style.setProperty('--joint', `${j_aB}deg`);
    el.querySelector('.f-leg-f').style.setProperty('--joint', `${j_lF}deg`); el.querySelector('.f-leg-b').style.setProperty('--joint', `${j_lB}deg`);

    if(f.isBlocking) {
      el.querySelector('.f-arm-f').style.transform = `rotate(-140deg) translate(5px, -5px)`; el.querySelector('.f-arm-b').style.transform = `rotate(140deg)`;
      el.querySelector('.f-torso').classList.add('block-aura');
    } else { el.querySelector('.f-torso').classList.remove('block-aura'); }

    if(f.hit) el.classList.add('hurt'); else el.classList.remove('hurt');
  };
  updateF(f1, document.getElementById('p1')); updateF(f2, document.getElementById('p2'));
  document.getElementById('hp-1').style.width = Math.max(0, f1.hp) + '%'; document.getElementById('hp-2').style.width = Math.max(0, f2.hp) + '%';
  document.getElementById('sp-1').style.width = f1.sp + '%'; document.getElementById('sp-2').style.width = f2.sp + '%';
}

function doAI(){
  if(soloParkour) return;
  let target = f1;
  const dist = Math.abs(f2.x - target.x);
  if (dist > 80) { keys2['a'] = f2.x > target.x; keys2['d'] = f2.x < target.x; } 
  else { keys2['a'] = false; keys2['d'] = false; keys2['j'] = Math.random() < 0.05; keys2['k'] = Math.random() < 0.03; keys2['b'] = Math.random() < 0.05;} 
}

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; }); document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
function bindTouch(id, k) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; btn.classList.add('pressed'); }, {passive: false});
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[k] = false; btn.classList.remove('pressed'); }, {passive: false});
}
bindTouch('btn-left', 'a'); bindTouch('btn-right', 'd'); bindTouch('btn-up', 'w'); bindTouch('btn-block', 'b'); bindTouch('btn-punch', 'j'); bindTouch('btn-kick', 'k'); bindTouch('btn-sp', 'l');
</script>
